            height: 40px;

            border-radius: 0%;

            height: 10px;
            background-color: #33b5e5;

        .hamburger-lines {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 20px;
            height: 14px;
            cursor: pointer;
        }
        .hamburger-lines div {
            width: 100%;
            height: 2px;
            background-color: #ffffff;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.error('Error al registrar SW', err));
            });
        }

        function App() {
            const [currentLanguage, setCurrentLanguage] = React.useState("Español");
            const [currentPage, setCurrentPage] = React.useState("home");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedVideo, setSelectedVideo] = React.useState(null);
            const [selectedChannel, setSelectedChannel] = React.useState(null);
            const [videos, setVideos] = React.useState([]);
            const [suggestedVideos, setSuggestedVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [playIframe, setPlayIframe] = React.useState(false);
            const [isSimulated, setIsSimulated] = React.useState(false);
            const [holoEnabled, setHoloEnabled] = React.useState(false);
            const [shareMenuOpen, setShareMenuOpen] = React.useState(false);
            
            // Gestión de Erreores con Modal y Reintento
            const [showErrorModal, setShowErrorModal] = React.useState(false);
            const [lastFailedAction, setLastFailedAction] = React.useState(null);

            const [pageHistory, setPageHistory] = React.useState(["home"]);
            const [footerMenuOpen, setFooterMenuOpen] = React.useState(false);
            const [subscribedChannels, setSubscribedChannels] = React.useState([]);
            const [favoriteVideos, setFavoriteVideos] = React.useState([]);
            const searchInputRef = React.useRef(null);

            const t = translations[currentLanguage];

            React.useEffect(() => {
                if (searchInputRef.current && (currentPage === "home" || currentPage === "search")) {
                    searchInputRef.current.focus();
                }
            }, [currentPage]);

            const triggerError = (retryCallback) => {
                setLastFailedAction(() => retryCallback);
                setShowErrorModal(true);
            };

            const handleRetry = () => {
                setShowErrorModal(false);
                if (lastFailedAction) {
                    lastFailedAction();
                }
            };

            const navigateTo = (page) => {
                setPageHistory(prev => [...prev, page]);
                setCurrentPage(page);
                setFooterMenuOpen(false);
                setShareMenuOpen(false);
            };

            const goBack = () => {
                if (pageHistory.length > 1) {
                    const newHistory = [...pageHistory];
                    newHistory.pop();
                    const previousPage = newHistory[newHistory.length - 1];
                    setPageHistory(newHistory);
                    setCurrentPage(previousPage);
                    setShareMenuOpen(false);
                    setFooterMenuOpen(false);
                }
            };

            const generateSimulatedVideos = (query = "", count = 50, suffix = "Falso") => {
                const simulatedList = [];
                const baseTitle = query.trim() !== "" ? `Simulado (${query})` : `Video Simulado ${suffix}`;
                for (let i = 1; i <= count; i++) {
                    simulatedList.push({
                        id: `simulated-id-${suffix}-${i}-${Math.floor(Math.random()*1000)}`,
                        title: `${baseTitle} #${i} - Contenido de demostración con interfaz clásica estructurada`,
                        likes: Math.floor(Math.random() * 5000).toLocaleString(),
                        views: Math.floor(Math.random() * 500000).toLocaleString(),
                        date: new Date(Date.now() - i * 24 * 60 * 60 * 1000).toLocaleDateString(),
                        duration: `${Math.floor(Math.random() * 9) + 1}:${Math.floor(Math.random() * 50) + 10}`,
                        channelName: `@canal_simulado_${i}`,
                        channelId: `sim-chan-${i}`,
                        description: `Esta es una descripción falsa simulada para el video #${i}.`,
                        thumbnail: "",
                        comments: [
                            { author: "@usuario_retro_1", text: "Excelente simulacro de la aplicación móvil original." }
                        ]
                    });
                }
                return simulatedList;
            };

            const fetchVideos = async (query = "") => {
                setLoading(true);

                if (isSimulated) {
                    setVideos(generateSimulatedVideos(query, 50, "Falso"));
                    setLoading(false);
                    return;
                }

                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API") {
                    setVideos([]);
                    setLoading(false);
                    triggerError(() => fetchVideos(query));
                    return;
                }

                try {
                    let url = "";
                    if (query.trim() === "") {
                        url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&key=${YOUTUBE_API_KEY}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    const data = await response.json();

                    let items = data.items || [];

                    if (query.trim() !== "" && items.length > 0) {
                        const videoIds = items.map(item => item.id?.videoId).filter(Boolean).join(",");
                        if (videoIds) {
                            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                            const statsResponse = await fetch(statsUrl);
                            if (statsResponse.ok) {
                                const statsData = await statsResponse.json();
                                items = statsData.items || [];
                            }
                        }
                    }

                    const formattedVideos = items.map(item => {
                        const durationISO = item.contentDetails?.duration || "PT3M15S";
                        const duration = parseISODuration(durationISO);
                        const finalId = item.id?.videoId || item.id;

                        return {
                            id: typeof finalId === 'object' ? finalId.videoId : finalId,
                            title: item.snippet?.title || t.fallbackVideoTitle,
                            likes: parseInt(item.statistics?.likeCount || 0).toLocaleString(),
                            views: parseInt(item.statistics?.viewCount || 0).toLocaleString(),
                            date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                            duration: duration,
                            channelName: item.snippet?.channelTitle ? `@${item.snippet.channelTitle.replace(/\s+/g, "_")}` : "@canal",
                            channelId: item.snippet?.channelId,
                            description: item.snippet?.description || t.fallbackDesc,
                            thumbnail: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
                            comments: []
                        };
                    });

                    setVideos(formattedVideos);

                } catch (err) {
                    setVideos([]);
                    triggerError(() => fetchVideos(query));
                } finally {
                    setLoading(false);
                }
            };

            const fetchSuggestions = async (video) => {
                if (isSimulated) {
                    setSuggestedVideos(generateSimulatedVideos(video.title, 25, "Sugerido"));
                    return;
                }
                try {
                    const cleanKeyword = video.title.split(" ").slice(0, 3).join(" ");
                    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(cleanKeyword)}&type=video&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const items = data.items || [];
                    const formatted = items.map(item => ({
                        id: item.id?.videoId,
                        title: item.snippet?.title || t.fallbackVideoTitle,
                        likes: Math.floor(Math.random()*1200).toLocaleString(),
                        views: Math.floor(Math.random()*90000).toLocaleString(),
                        date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                        duration: "03:45",
                        channelName: item.snippet?.channelTitle ? `@${item.snippet.channelTitle.replace(/\s+/g, "_")}` : "@canal",
                        channelId: item.snippet?.channelId,
                        description: item.snippet?.description || t.fallbackDesc,
                        thumbnail: item.snippet?.thumbnails?.medium?.url || ""
                    }));
                    setSuggestedVideos(formatted);
                } catch (e) {
                    setSuggestedVideos([]);
                    triggerError(() => fetchSuggestions(video));
                }
            };

            const parseISODuration = (isoString) => {
                const match = isoString.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                if (!match) return "00:00:00";
                const hours = parseInt(match[1] || 0);
                const minutes = parseInt(match[2] || 0);
                const seconds = parseInt(match[3] || 0);
                const pad = (n) => String(n).padStart(2, "0");
                return hours > 0 ? `${pad(hours)}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
            };

            const fetchComments = async (videoId) => {
                if (isSimulated || !YOUTUBE_API_KEY || !videoId) return;
                try {
                    const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=15&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        const fetchedComments = (data.items || []).map(item => ({
                            author: `@${item.snippet.topLevelComment.snippet.authorDisplayName.replace(/\s+/g, "_")}`,
                            text: item.snippet.topLevelComment.snippet.textDisplay
                        }));
                        setSelectedVideo(prev => prev ? { ...prev, comments: fetchedComments } : null);
                    }
                } catch (err) {
                    console.error("Error fetching comments:", err);
                }
            };

            const fetchChannelDetails = async (channelId, channelHandle) => {
                setLoading(true);
                if (!channelId) {
                    setLoading(false);
                    return;
                }

                if (isSimulated) {
                    const mockChannelVideos = [];
                    for (let i = 1; i <= 50; i++) {
                        mockChannelVideos.push({
                            id: `sim-chan-vid-${i}-${Math.random()}`,
                            title: `Subida simulada #${i} de este canal`,
                            likes: Math.floor(Math.random()*400).toLocaleString(),
                            views: Math.floor(Math.random()*25000).toLocaleString(),
                            date: new Date(Date.now() - i * 2 * 24 * 60 * 60 * 1000).toLocaleDateString(),
                            duration: "05:12",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: "Descripción simulada de video del canal.",
                            thumbnail: ""
                        });
                    }
                    setSelectedChannel({
                        id: channelId,
                        name: channelHandle,
                        subscribers: "250,000",
                        videoViews: "1,200,500",
                        uploads: "50",
                        description: "Esta es la biografía de un canal totalmente simulado.",
                        avatar: "",
                        publishedAt: "15/08/2012",
                        country: "México",
                        videos: mockChannelVideos
                    });
                    navigateTo("channel");
                    setLoading(false);
                    return;
                }

                try {
                    const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(chanUrl);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const item = data.items?.[0];

                    if (!item) throw new Error();

                    // Cargar absolutamente TODOS los videos usando paginación consecutiva de tokens
                    let allVideos = [];
                    let nextPageToken = "";
                    let fetchMore = true;

                    while (fetchMore) {
                        const videosUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=50&order=date&type=video&pageToken=${nextPageToken}&key=${YOUTUBE_API_KEY}`;
                        const resVideos = await fetch(videosUrl);
                        if (!resVideos.ok) throw new Error();
                        
                        const dataV = await resVideos.json();
                        const pageVideos = (dataV.items || []).map(v => ({
                            id: v.id?.videoId || v.id,
                            title: v.snippet?.title || t.fallbackVideoTitle,
                            likes: "---",
                            views: "Ver",
                            date: new Date(v.snippet?.publishedAt).toLocaleDateString(),
                            duration: "--:--",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: v.snippet?.description || t.fallbackDesc,
                            thumbnail: v.snippet?.thumbnails?.high?.url || v.snippet?.thumbnails?.medium?.url || ""
                        }));

                        allVideos = [...allVideos, ...pageVideos];
                        nextPageToken = dataV.nextPageToken;

                        if (!nextPageToken) {
                            fetchMore = false;
                        }
                    }

                    const rawDate = item?.snippet?.publishedAt;
                    const formattedDate = rawDate ? new Date(rawDate).toLocaleDateString('es-ES') : "Desconocido";
                    const countryName = item?.snippet?.country || null;

                    setSelectedChannel({
                        id: channelId,
                        name: channelHandle,
                        subscribers: parseInt(item?.statistics?.subscriberCount || 0).toLocaleString(),
                        videoViews: parseInt(item?.statistics?.viewCount || 0).toLocaleString(),
                        uploads: parseInt(item?.statistics?.videoCount || 0).toLocaleString(),
                        description: item?.snippet?.description || t.fallbackChannelDesc,
                        avatar: item?.snippet?.thumbnails?.high?.url || item?.snippet?.thumbnails?.medium?.url || "",
                        publishedAt: formattedDate,
                        country: countryName,
                        videos: allVideos
                    });

                    navigateTo("channel");
                } catch (err) {
                    console.error(err);
                    triggerError(() => fetchChannelDetails(channelId, channelHandle));
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchVideos(searchQuery);
            }, [currentLanguage, isSimulated]);

            const handleSearch = (e) => {
                if (e) e.preventDefault();
                fetchVideos(searchQuery);
                navigateTo("search");
            };

            const handleVideoClick = (video) => {
                setSelectedVideo(video);
                setPlayIframe(false);
                setSuggestedVideos([]);
                navigateTo("player");
                
                if (video.id) {
                    fetchComments(video.id);
                    setTimeout(() => {
                        fetchSuggestions(video);
                    }, 2000); 
                }
            };

            const handleChannelClick = (channelId, channelName) => {
                if (channelId) {
                    fetchChannelDetails(channelId, channelName);
                }
            };

            const toggleSubscription = (channel) => {
                const isSubbed = subscribedChannels.some(c => c.id === channel.id);
                if (isSubbed) {
                    setSubscribedChannels(prev => prev.filter(c => c.id !== channel.id));
                } else {
                    setSubscribedChannels(prev => [...prev, { id: channel.id, name: channel.name }]);
                }
            };

            const toggleFavorite = (video) => {
                const isFav = favoriteVideos.some(v => v.id === video.id);
                if (isFav) {
                    setFavoriteVideos(prev => prev.filter(v => v.id !== video.id));
                } else {
                    setFavoriteVideos(prev => [...prev, video]);
                }
            };

            const handleShareAction = (type) => {
                const videoUrl = `https://www.youtube.com/watch?v=${selectedVideo.id}`;
                if (type === "whatsapp") {
                    const text = encodeURIComponent(`¡Mira este video! ${videoUrl}`);
                    window.open(`https://api.whatsapp.com/send?text=${text}`, "_blank");
                } else if (type === "copy") {
                    navigator.clipboard.writeText(videoUrl);
                    alert("¡Enlace copiado al portapapeles!");
                } else if (type === "mp4" || type === "mp3") {
                    window.open(`https://www.youtubepp.com/watch?v=${selectedVideo.id}${type === "mp3" ? "#mp3" : ""}`, "_blank");
                }
                setShareMenuOpen(false);
            };

            const showSearchBar = currentPage === "home" || currentPage === "search";

            return (
                <div className="w-full max-w-md landscape:max-w-none mx-auto min-h-screen bg-black border-x border-gray-800 flex flex-col justify-between px-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)] pb-14 relative">
                    
                    {/* Ventana Emergente de Error Personalizada */}
                    {showErrorModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4 z-[9999]">
                            {holoEnabled ? (
                                /* DISEÑO POPUP TEMA HOLO */
                                <div className="bg-zinc-950 border-2 border-[#33b5e5] w-full max-w-xs p-4 flex flex-col font-sans">
                                    <h3 className="text-[#33b5e5] font-bold text-base tracking-wide uppercase mb-3">
                                        Error
                                    </h3>
                                    <p className="text-white text-sm leading-normal mb-5">
                                        {t.apiError}
                                    </p>
                                    <button
                                        onClick={handleRetry}
                                        className="self-end bg-zinc-900 text-[#33b5e5] border border-[#33b5e5]/50 px-5 py-2 font-bold uppercase tracking-wider text-xs hover:bg-zinc-800 active:bg-zinc-700 transition"
                                    >
                                        {t.retry}
                                    </button>
                                </div>
                            ) : (
                                /* DISEÑO POPUP TEMA CLÁSICO */

                                                className={`cursor-pointer select-none underline tracking-wide uppercase ${
                                                    currentLanguage === lang
                                                    ? (holoEnabled ? "text-[#33b5e5] font-black scale-105" : "text-yellow-400 font-black scale-105")
                                                    : (holoEnabled ? "text-cyan-600/70 hover:text-[#33b5e5]" : "text-yellow-500/70 hover:text-yellow-400")
                                                }`}
                                            >
                                                {lang}
                                            </p>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-lg font-bold border-b border-gray-800 pb-1 mb-2">{t.about}</h2>
                                    <p className="text-sm text-gray-300 leading-relaxed text-justify mb-2">
                                        {t.aboutText}
                                    </p>
                                    <p className={`text-xs bg-zinc-950 p-2 border leading-normal text-left font-mono ${holoEnabled ? "border-[#33b5e5]/40 text-[#33b5e5]" : "border-zinc-800 text-yellow-500/90"}`}>
                                        {t.licenseText}
                                    </p>
                                </div>
                            </div>
                        )}

                    </div>

                    <footer className={`fixed bottom-0 left-0 right-0 h-12 flex items-center justify-between px-6 z-50 transition-all ${
                        holoEnabled ? "bg-zinc-950 border-t-2 border-[#33b5e5]" : "bg-zinc-950 border-t border-zinc-800"
                    }`}>
                        <button 
                            onClick={goBack} 
                            disabled={pageHistory.length <= 1}
                            className={`text-xl font-bold transition select-none ${pageHistory.length <= 1 ? "text-zinc-700 cursor-not-allowed" : "text-white hover:text-gray-300"}`}
                        >
                            ←
                        </button>

                        <div className="relative">
                            <div 
                                onClick={() => setFooterMenuOpen(!footerMenuOpen)} 
                                className="hamburger-lines p-1"
                            >
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                            </div>

                            {footerMenuOpen && (
                                <div className={`absolute right-0 bottom-10 w-44 bg-zinc-900 border-2 font-mono text-xs shadow-2xl divide-y divide-zinc-800 z-50 ${
                                    holoEnabled ? "border-[#33b5e5]" : "border-zinc-700"
                                }`}>
                                    <button 
                                        onClick={() => { setSearchQuery(""); fetchVideos(""); navigateTo("home"); }}
                                        className={`w-full text-left px-3 py-2 hover:bg-zinc-800 transition font-bold block ${holoEnabled ? "text-[#33b5e5]" : "text-white"}`}
                                    >
                                        • {t.navHome}
                                    </button>
                                    <button 
                                        onClick={() => navigateTo("subscriptions")}
                                        className={`w-full text-left px-3 py-2 hover:bg-zinc-800 transition font-bold block ${holoEnabled ? "text-[#33b5e5]" : "text-white"}`}
                                    >
                                        • {t.navSubs}
                                    </button>
                                    <button 
                                        onClick={() => { setFooterMenuOpen(false); if(currentPage !== "home" && currentPage !== "search") { navigateTo("home"); } setTimeout(() => searchInputRef.current?.focus(), 100); }}
                                        className={`w-full text-left px-3 py-2 hover:bg-zinc-800 transition font-bold block ${holoEnabled ? "text-[#33b5e5]" : "text-white"}`}
                                    >
                                        • {t.navSearch}
                                    </button>
                                    <button 
                                        onClick={() => navigateTo("favorites")}
                                        className={`w-full text-left px-3 py-2 hover:bg-zinc-800 transition font-bold block ${holoEnabled ? "text-[#33b5e5]" : "text-white"}`}
                                    >
                                        • {t.navFavs}
                                    </button>
                                    <button 
                                        onClick={() => navigateTo("config")}
                                        className={`w-full text-left px-3 py-2 hover:bg-zinc-800 transition font-bold block ${holoEnabled ? "text-[#33b5e5]" : "text-white"}`}
                                    >
                                        • {t.navConfig}
                                    </button>
                                </div>
                            )}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
