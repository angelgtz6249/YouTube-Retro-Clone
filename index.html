            // Integración de Google Login Simulado
            const [googleUser, setGoogleUser] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_guser");
                return saved ? JSON.parse(saved) : null;
            });

            // Estados persistidos en localStorage
            const [subscribedChannels, setSubscribedChannels] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_subs");
                return saved ? JSON.parse(saved) : [];
            });
            const [favoriteVideos, setFavoriteVideos] = React.useState(() => {

                return saved ? JSON.parse(saved) : [];
            });
            const [watchHistory, setWatchHistory] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_history");
                return saved ? JSON.parse(saved) : [];
            });
            const [historyPaused, setHistoryPaused] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_history_paused");
                return saved ? JSON.parse(saved) === "true" : false;
            });
            const [searchHistory, setSearchHistory] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_search_history");
                return saved ? JSON.parse(saved) : [];
            });
            const [incognitoEnabled, setIncognitoEnabled] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_incognito");
                return saved ? JSON.parse(saved) === "true" : false;
            });
            const [myPlaylists, setMyPlaylists] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_my_playlists");
                return saved ? JSON.parse(saved) : [];
            });

            const [selectedHistoryVideos, setSelectedHistoryVideos] = React.useState([]);
            const [selectedPlaylistsToDelete, setSelectedPlaylistsToDelete] = React.useState([]);
            const [activeSubMenu, setActiveSubMenu] = React.useState(null);
            const [isLandscape, setIsLandscape] = React.useState(window.innerWidth > window.innerHeight);

            // Control de vistas dentro de un Canal (Subidas vs Playlists)
            const [channelTab, setChannelTab] = React.useState("uploads"); // "uploads" | "playlists"

            // UI Toggles para menús desplegables integrados
            const [playlistFormOpen, setPlaylistFormOpen] = React.useState(false);
            const [savePlaylistDropdownOpen, setSavePlaylistDropdownOpen] = React.useState(false);
            const [commentBoxOpen, setCommentBoxOpen] = React.useState(false);
            const [editingCommentId, setEditingCommentId] = React.useState(null);

            // Nuevos datos de inputs de formularios
            const [newPlName, setNewPlName] = React.useState("");
            const [newPlDesc, setNewPlDesc] = React.useState("");
            const [newPlVisibility, setNewPlVisibility] = React.useState("public");
            const [commentInput, setCommentInput] = React.useState("");
            const [editCommentInput, setEditCommentInput] = React.useState("");

            const globalKeywords = ["Minecraft 2012 alpha", "Gangnam Style live", "iPhone 5 review", "Retro gaming setup", "Harlem Shake original"];

            const searchInputRef = React.useRef(null);
            const playbackTimerRef = React.useRef(null);

            const t = translations[currentLanguage];

            React.useEffect(() => {
                const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
                window.addEventListener("resize", handleResize);
                return () => window.removeEventListener("resize", handleResize);
            }, []);

            React.useEffect(() => { localStorage.setItem("yt_retro_subs", JSON.stringify(subscribedChannels)); }, [subscribedChannels]);
            React.useEffect(() => { localStorage.setItem("yt_retro_favs", JSON.stringify(favoriteVideos)); }, [favoriteVideos]);
            React.useEffect(() => { localStorage.setItem("yt_retro_history", JSON.stringify(watchHistory)); }, [watchHistory]);
            React.useEffect(() => { localStorage.setItem("yt_retro_history_paused", historyPaused.toString()); }, [historyPaused]);
            React.useEffect(() => { localStorage.setItem("yt_retro_search_history", JSON.stringify(searchHistory)); }, [searchHistory]);
            React.useEffect(() => { localStorage.setItem("yt_retro_incognito", incognitoEnabled.toString()); }, [incognitoEnabled]);
            React.useEffect(() => { localStorage.setItem("yt_retro_my_playlists", JSON.stringify(myPlaylists)); }, [myPlaylists]);
            React.useEffect(() => { 
                if (googleUser) localStorage.setItem("yt_retro_guser", JSON.stringify(googleUser));
                else localStorage.removeItem("yt_retro_guser");
            }, [googleUser]);

            React.useEffect(() => {
                if (currentPage === "player" && selectedVideo && !historyPaused && !incognitoEnabled) {
                    playbackTimerRef.current = setTimeout(() => {
                        setWatchHistory(prev => {
                            const exists = prev.some(v => v.id === selectedVideo.id);
                            if (exists) return prev;
                            return [selectedVideo, ...prev];
                        });
                    }, 1000);
                }
                return () => { if (playbackTimerRef.current) clearTimeout(playbackTimerRef.current); };
            }, [currentPage, selectedVideo, historyPaused, incognitoEnabled]);

            React.useEffect(() => {
                fetch('manifest.json')
                    .then(res => { if (res.ok) return res.json(); throw new Error(); })
                    .then(data => {
                        if (data && data.icons && data.icons.length > 0) {
                            const iconSrc = data.icons[0].src;
                            setManifestIconUrl(iconSrc);
                            let link = document.querySelector("link[rel~='icon']");
                            if (!link) {
                                link = document.createElement('link');
                                link.rel = 'icon';

            const fetchVideos = async (query = "") => {
                setLoading(true);
                if (isSimulated) {
                    setVideos(generateSimulatedVideos(query, 50, "Falso"));
                    setLoading(false);
                    return;
                }
                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API") {
                    setVideos([]);
                    setLoading(false);
                    triggerError(() => fetchVideos(query));
                    return;
                }
                try {
                    let url = "";
                    if (query.trim() === "") {
                        url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&key=${YOUTUBE_API_KEY}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    let items = data.items || [];

                    if (query.trim() !== "" && items.length > 0) {
                        const videoIds = items.map(item => item.id?.videoId).filter(Boolean).join(",");
                        if (videoIds) {
                            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                            const statsResponse = await fetch(statsUrl);
                            if (statsResponse.ok) {
                                const statsData = await statsResponse.json();
                                items = statsData.items || [];
                            }
                        }
                    }

                    const formattedVideos = items.map(item => {
                        const durationISO = item.contentDetails?.duration || "PT3M15S";
                        const duration = parseISODuration(durationISO);
                        const finalId = item.id?.videoId || item.id;
                        return {
                            id: typeof finalId === 'object' ? finalId.videoId : finalId,
                            title: item.snippet?.title || t.fallbackVideoTitle,
                            likes: parseInt(item.statistics?.likeCount || 0).toLocaleString(),
                            views: parseInt(item.statistics?.viewCount || 0).toLocaleString(),

                            description: item.snippet?.description || t.fallbackDesc,
                            thumbnail: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
                            comments: []
                        };
                    });
                    setVideos(formattedVideos);

                    setVideos([]);
                    triggerError(() => fetchVideos(query));

                    setLoading(false);

                    const cleanKeyword = video.title.split(" ").slice(0, 3).join(" ");

                    const res = await fetch(url);

                        id: item.id?.videoId,

                const match = isoString.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                if (!match) return "00:00:00";
                const hours = parseInt(match[1] || 0);
                const minutes = parseInt(match[2] || 0);
                const seconds = parseInt(match[3] || 0);
                const pad = (n) => String(n).padStart(2, "0");
                return hours > 0 ? `${pad(hours)}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
            };

                    return;

                    const res = await fetch(chanUrl);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const item = data.items?.[0];
                    if (!item) throw new Error();

                    let allVideos = [];
                    let nextPageToken = "";
                    let fetchMore = true;
                    while (fetchMore) {

                        const resVideos = await fetch(videosUrl);
                        if (!resVideos.ok) throw new Error();

                            views: "15,230",
                            date: new Date(v.snippet?.publishedAt).toLocaleDateString(),
                            duration: "04:20",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: v.snippet?.description || t.fallbackDesc,
                            thumbnail: v.snippet?.thumbnails?.high?.url || v.snippet?.thumbnails?.medium?.url || ""
                        }));
                        allVideos = [...allVideos, ...pageVideos];
                        nextPageToken = dataV.nextPageToken;

                    }

                    setSelectedChannel({
                        id: channelId,
                        name: channelHandle,
                        subscribers: parseInt(item?.statistics?.subscriberCount || 0).toLocaleString(),
                        videoViews: parseInt(item?.statistics?.viewCount || 0).toLocaleString(),
                        uploads: parseInt(item?.statistics?.videoCount || 0).toLocaleString(),
                        description: item?.snippet?.description || t.fallbackChannelDesc,
                        avatar: item?.snippet?.thumbnails?.high?.url || item?.snippet?.thumbnails?.medium?.url || "",
                        publishedAt: item?.snippet?.publishedAt ? new Date(item.snippet.publishedAt).toLocaleDateString() : "Desconocido",
                        country: item?.snippet?.country || null,
                        videos: allVideos,
                        playlists: mockPlaylists

                    navigateTo("channel");

            const handleShareAction = (type) => {

                else if (type === "pinterest") window.open(`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(videoUrl)}`, "_blank");
                else if (type === "linkedin") window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(videoUrl)}`, "_blank");
                else if (type === "copy") {
                    navigator.clipboard.writeText(videoUrl);
                    alert("¡Enlace copiado al portapapeles!");
                } else if (type === "mp4" || type === "mp3") {
                    const ext = type === "mp4" ? "mp4" : "mp3";
                    const blob = new Blob(["Archivo multimedia"], { type: type === "mp4" ? "video/mp4" : "audio/mp3" });

                                        <div key={idx} className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1" onClick={() => handleVideoClick(video)}>
                                            <div className="w-24 h-16 bg-zinc-900 flex-shrink-0 overflow-hidden relative">
                                                {video.thumbnail && <img src={video.thumbnail} className="w-full h-full object-cover" />}
                                            </div>
                                            <div className="flex-1 text-xs">
                                                <h4 className="font-bold text-white line-clamp-1">{video.title}</h4>
                                                <p className="text-zinc-400 mt-1">{video.views} vistas</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentPage === "subscriptions" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-3 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>{t.navSubs}</h2>
                                {subscribedChannels.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptySubs}</p>
                                ) : (
                                    <div className="space-y-2 font-mono">
                                        {subscribedChannels.map((chan) => (
                                            <div key={chan.id} onClick={() => fetchChannelDetails(chan.id, chan.name)} className={`p-2 border bg-zinc-950 hover:bg-zinc-900 cursor-pointer transition flex items-center ${holoEnabled ? "border-[#33b5e5]/40" : "border-zinc-800"}`}>
                                                <span className={`font-bold text-sm select-none ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{chan.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === "favorites" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-3 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>{t.navFavs} (Ver más tarde)</h2>
                                {favoriteVideos.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptyFavs}</p>
                                ) : (
                                    <div className="space-y-4 grid grid-cols-1 landscape:grid-cols-2 landscape:gap-6 landscape:space-y-0">
                                        {favoriteVideos.map((video, index) => (
                                            <div key={`fav-${video.id}-${index}`} className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1.5 transition w-full" onClick={() => handleVideoClick(video)}>
                                                <div className="w-32 landscape:w-44 h-20 landscape:h-28 bg-zinc-950 flex-shrink-0 flex items-center justify-center border border-gray-700 overflow-hidden relative">
                                                    {video.thumbnail ? <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" /> : <span className="text-[10px] text-zinc-400 font-bold font-mono tracking-tighter uppercase p-1 bg-white text-zinc-600 w-full h-full flex items-center justify-center">Simulado</span>}
                                                    <span className="absolute bottom-0.5 right-0.5 bg-black/80 text-[10px] text-white px-1 font-mono">{video.duration}</span>
                                                </div>
                                                <div className="flex-1 text-white text-[13px] landscape:text-[15px] leading-tight flex flex-col justify-start">
                                                    <h3 className="font-bold text-[14px] landscape:text-[16px] line-clamp-2 leading-snug">{video.title}</h3>
                                                    <p className="mt-1 font-semibold"># {t.likes}: {video.likes}</p>
                                                    <p className="font-semibold"># {t.views}: {video.views}</p>
                                                    <p className="text-gray-400 font-medium">{video.date}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Nueva Vista de Gestión Local: Mis Listas de Reproducción */}
                        {currentPage === "myPlaylistsPage" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-2 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-zinc-700"}`}>{t.myPlaylistsTitle}</h2>
                                
                                <div className="flex flex-col gap-1.5 mb-4 text-xs font-bold font-mono">
                                    <span onClick={() => setPlaylistFormOpen(!playlistFormOpen)} className={`cursor-pointer underline uppercase ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.createPlaylist}</span>
                                    <span onClick={selectedPlaylistsToDelete.length > 0 ? handleDeleteSelectedPlaylists : null} className={`uppercase underline ${selectedPlaylistsToDelete.length > 0 ? "cursor-pointer" : "opacity-30 cursor-not-allowed"} ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.deleteSelectedPlaylists}</span>
                                </div>

                                {playlistFormOpen && (
                                    <form onSubmit={handleCreatePlaylistSubmit} className="mb-4 p-3 bg-zinc-950 border border-zinc-800 space-y-2 font-mono text-xs">
                                        <div>
                                            <label className="block mb-0.5 text-zinc-400">{t.playlistName}:</label>
                                            <input type="text" required value={newPlName} onChange={(e) => setNewPlName(e.target.value)} className="w-full bg-zinc-900 border border-zinc-700 p-1 text-white" />
                                        </div>
                                        <div>
                                            <label className="block mb-0.5 text-zinc-400">{t.playlistDesc}:</label>
                                            <textarea value={newPlDesc} onChange={(e) => setNewPlDesc(e.target.value)} className="w-full bg-zinc-900 border border-zinc-700 p-1 text-white h-12 resize-none" />
                                        </div>
                                        <div>
                                            <label className="block mb-0.5 text-zinc-400">{t.playlistVisibility}:</label>
                                            <select value={newPlVisibility} disabled={!googleUser} onChange={(e) => setNewPlVisibility(e.target.value)} className="w-full bg-zinc-900 border border-zinc-700 p-1 text-white">
                                                <option value="public">{t.visibilityPublic}</option>
                                                <option value="private">{t.visibilityPrivate}</option>
                                            </select>
                                            {!googleUser && <p className="text-[10px] text-zinc-500 mt-0.5">{t.visibilityNotAvailable}</p>}
                                        </div>
                                        <button type="submit" className="w-full bg-zinc-800 p-1.5 font-bold uppercase border border-zinc-600">{t.btnCreate}</button>
                                    </form>
                                )}

                                {myPlaylists.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic font-mono">{t.emptyPlaylists}</p>
                                ) : (
                                    <div className="space-y-2 font-mono text-xs">
                                        {myPlaylists.map(pl => (
                                            <div key={pl.id} className="flex items-center gap-2 bg-zinc-950 p-2 border border-zinc-900">
                                                <input type="checkbox" checked={selectedPlaylistsToDelete.includes(pl.id)} onChange={() => toggleSelectPlaylistToDelete(pl.id)} className="w-4 h-4 cursor-pointer" />
                                                <div className="flex-1 cursor-pointer flex justify-between" onClick={() => openPlaylistDetails(pl.name, googleUser ? googleUser.channelName : "Local", pl.count)}>
                                                    <span className="font-bold text-white">📂 {pl.name}</span>
                                                    <span className="text-zinc-400">[{pl.count} vids - {pl.visibility}]</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Nueva Vista: Mis Subidas (Solo lectura) */}
                        {currentPage === "myUploadsPage" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-3 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400 border-zinc-700"}`}>{t.myUploads}</h2>
                                <div className="space-y-4">
                                    {videos.slice(0, 4).map((video, idx) => (
                                        <div key={idx} className="flex gap-3 p-1.5 border border-zinc-900 bg-zinc-950">
                                            <div className="w-24 h-16 bg-zinc-900 flex-shrink-0 overflow-hidden relative">
                                                {video.thumbnail && <img src={video.thumbnail} className="w-full h-full object-cover" />}
                                            </div>
                                            <div className="flex-1 text-xs">
                                                <h4 className="font-bold text-white line-clamp-1">{video.title}</h4>
                                                <p className="text-zinc-400 font-mono text-[10px] mt-1">Sincronizado • Solo lectura</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {currentPage === "history" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-2 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>{t.navHistory}</h2>
                                <div className="flex flex-wrap gap-x-4 gap-y-1 mb-4 text-xs font-bold font-mono">
                                    <span onClick={handleSelectAllHistory} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.selectAll}</span>
                                    <span onClick={handleClearAllHistory} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.clearAllHistory}</span>
                                    <span onClick={() => setHistoryPaused(!historyPaused)} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{historyPaused ? t.resumeHistory : t.pauseHistory}</span>
                                    <span onClick={selectedHistoryVideos.length > 0 ? handleDeleteSelectedHistory : null} className={`underline ${selectedHistoryVideos.length > 0 ? "cursor-pointer" : "opacity-40 cursor-not-allowed"} ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.deleteSelected}</span>
                                </div>
                                {watchHistory.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptyHistory}</p>
                                ) : (
                                    <div className="space-y-3">
                                        {watchHistory.map((video, index) => (
                                            <div key={`hist-${video.id}-${index}`} className="flex items-center gap-2 bg-zinc-950 p-1 border border-zinc-900">
                                                <input type="checkbox" checked={selectedHistoryVideos.includes(video.id)} onChange={() => toggleSelectHistoryVideo(video.id)} className="w-4 h-4 cursor-pointer accent-orange-500" />
                                                <div className="flex flex-1 gap-2 cursor-pointer items-center" onClick={() => handleVideoClick(video)}>
                                                    <div className="w-20 h-12 bg-zinc-900 flex-shrink-0 overflow-hidden relative">
                                                        {video.thumbnail && <img src={video.thumbnail} className="w-full h-full object-cover" />}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="text-xs font-bold text-white line-clamp-1">{video.title}</h4>
                                                        <p className="text-[10px] text-zinc-400">{video.channelName}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === "config" && (
                            <div className="p-3 space-y-6">
                                <div className="border-b border-gray-800 pb-4 space-y-3">
                                    <div className="flex flex-col items-start">
                                        <span className="text-base font-bold text-white tracking-wide uppercase block mb-1">{t.simulatedModeText}</span>
                                        <p onClick={() => setIsSimulated(!isSimulated)} className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{isSimulated ? t.simulatedModeActive : t.simulatedModeInactive}</p>
                                    </div>
                                    <div className="flex flex-col items-start pt-2">
                                        <p onClick={() => setHoloEnabled(!holoEnabled)} className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{holoEnabled ? t.holoActive : t.holoInactive}</p>
                                    </div>
                                    <div className="flex flex-col items-start pt-2 border-t border-zinc-900 w-full gap-2">
                                        <p onClick={() => setSearchHistory([])} className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{t.clearSearchHistory}</p>
                                        <p onClick={() => setIncognitoEnabled(!incognitoEnabled)} className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>{incognitoEnabled ? t.incognitoOn : t.incognitoOff}</p>
                                    </div>
                                </div>
                                <div>
                                    <span className="text-base font-bold text-white tracking-wide uppercase block mb-2">{t.language}</span>
                                    <div className="flex flex-wrap gap-4 font-bold text-sm">
                                        {["Español", "English", "Português", "Русский"].map((lang) => (
                                            <p key={lang} onClick={() => setCurrentLanguage(lang)} className={`cursor-pointer select-none underline tracking-wide uppercase ${currentLanguage === lang ? (holoEnabled ? "text-[#33b5e5] font-black scale-105" : "text-yellow-400 font-black scale-105") : (holoEnabled ? "text-cyan-600/70" : "text-yellow-500/70")}`}>{lang}</p>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <h2 className="text-lg font-bold border-b border-gray-800 pb-1 mb-2">{t.about}</h2>
                                    <p className="text-sm text-gray-300 leading-relaxed text-justify mb-2">{t.aboutText}</p>
                                    <p className={`text-xs bg-zinc-950 p-2 border leading-normal text-left font-mono ${holoEnabled ? "border-[#33b5e5]/40 text-[#33b5e5]" : "border-zinc-800 text-yellow-500/90"}`}>{t.licenseText}</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Menú Contextual del Footer Adaptativo con Submenú "Más" Integrado */}
                    {footerMenuOpen && (
                        <div onClick={(e) => e.stopPropagation()} className={`fixed left-0 right-0 bottom-12 p-2 grid gap-2 z-50 ${isLandscape ? "grid-cols-6" : "grid-cols-3"} ${holoEnabled ? "bg-black/80 border-t border-[#33b5e5]" : "bg-neutral-100 border-t border-neutral-300"}`}>
                            <button onClick={() => { setSearchQuery(""); fetchVideos(""); navigateTo("home"); }} className={getGridItemClass()}><span className="text-xs font-bold">{t.navHome}</span></button>
                            <button onClick={() => navigateTo("subscriptions")} className={getGridItemClass()}><span className="text-xs font-bold">{t.navSubs}</span></button>
                            <button onClick={() => { setFooterMenuOpen(false); if(currentPage !== "home" && currentPage !== "search") { navigateTo("home"); } setTimeout(() => searchInputRef.current?.focus(), 100); }} className={getGridItemClass()}><span className="text-xs font-bold">{t.navSearch}</span></button>
                            <button onClick={() => navigateTo("favorites")} className={getGridItemClass()}><span className="text-xs font-bold">{t.navFavs}</span></button>
                            <button onClick={() => navigateTo("history")} className={getGridItemClass()}><span className="text-xs font-bold">{t.navHistory}</span></button>
                            
                            <div className="relative">
                                <button onClick={() => setActiveSubMenu(activeSubMenu === "footerMore" ? null : "footerMore")} className={`${getGridItemClass()} w-full h-full`}>
                                    <svg className={`w-4 h-4 mb-0.5 ${getGridIconColorClass()}`} viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 13l-4-4h8l-4 4z"/></svg>
                                    <span className="text-xs font-bold">Más</span>
                                </button>
                                {activeSubMenu === "footerMore" && (
                                    <div className={`absolute bottom-full right-0 mb-1 w-44 border-2 z-50 font-mono text-left text-[11px] divide-y shadow-2xl ${holoEnabled ? "bg-zinc-950 border-[#33b5e5] divide-zinc-800 text-[#33b5e5]" : "bg-white border-zinc-700 divide-gray-200 text-black"}`}>
                                        <button onClick={() => navigateTo("config")} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.configTitle}</button>
                                        <button onClick={() => navigateTo("myPlaylistsPage")} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.myPlaylistsTitle}</button>
                                        <button onClick={openMyChannelView} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.myChannel}</button>
                                        <button onClick={openMyUploadsView} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.myUploads}</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer onClick={(e) => e.stopPropagation()} className={`fixed bottom-0 left-0 right-0 h-12 flex items-center justify-between px-6 z-50 transition-all ${holoEnabled ? "bg-zinc-950 border-t-2 border-[#33b5e5]" : "bg-zinc-950 border-t border-zinc-800"}`}>
                        <button onClick={goBack} disabled={pageHistory.length <= 1} className={`text-xl font-bold transition select-none ${pageHistory.length <= 1 ? "text-zinc-700 cursor-not-allowed" : "text-white hover:text-gray-300"}`}>←</button>
                        <div className="relative">
                            <div onClick={(e) => { e.stopPropagation(); setFooterMenuOpen(!footerMenuOpen); setActiveSubMenu(null); }} className="hamburger-lines p-1">
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
