<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Retro Clone</title>
    <!-- Tailwind CSS para diseño fluido y estructurado de forma simplificada -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para compilar JSX en navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Estilos específicos para imitar el aspecto de las capturas de pantalla */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        /* Eliminar estilos por defecto de inputs */
        input:focus {
            outline: none;
        }
        /* Estilo de tres puntitos verticales */
        .vertical-dots {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 14px;
            height: 40px;
            cursor: pointer;
        }
        .vertical-dots div {
            width: 12px;
            height: 12px;
            background-color: #a3a3a3;
            border-radius: 50%;
        }
    </style>
	<!-- Vincular el Manifiesto PWA -->
<link rel="manifest" href="manifest.json">

<!-- Registro del Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.error('Error al registrar SW', err));
    });
  }
</script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const YOUTUBE_API_KEY = "AIzaSyC6fHHTGlkndc4wsDgKRinMQUJVwqd-Xo0";

        const translations = {
            Español: {
                searchPlaceholder: "Buscar...",
                likes: "Likes",
                views: "Vistas",
                subscribers: "Suscriptores",
                videoViews: "Visitas de videos",
                uploads: "Subidas",
                channelUploads: "Subidas del canal",
                comments: "Comentarios",
                language: "Idioma",
                about: "Acerca de",
                aboutText: "Esta aplicación es un clon conmemorativo de YouTube optimizado para simular las interfaces móviles clásicas y estructuradas según las especificaciones del diseño proporcionado. Ofrece navegación fluida entre videos, búsqueda directa de contenido, vistas de canal individuales, comentarios dinámicos y soporte multilenguaje completo en Español, Inglés y Portugués. Integra la API de YouTube v3 para obtener datos del mundo real de manera asíncrona.",
                duration: "Duración",
                noResults: "No se encontraron videos coincidentes.",
                fallbackVideoTitle: "Título del video simulado",
                fallbackDesc: "Descripción de ejemplo para este video de demostración. Muestra cómo se adaptan los textos en un contenedor de altura limitada de dos renglones que se corta con tres puntitos.",
                fallbackChannelDesc: "Descripción informativa del canal. Aquí se explica el contenido del creador, la temática principal del canal y más detalles importantes recortados a dos renglones.",
                configTitle: "Configuración"
            },
            English: {
                searchPlaceholder: "Search...",
                likes: "Likes",
                views: "Views",
                subscribers: "Subscribers",
                videoViews: "Video Views",
                uploads: "Uploads",
                channelUploads: "Channel uploads",
                comments: "Comments",
                language: "Language",
                about: "About",
                aboutText: "This application is a commemorative YouTube clone optimized to simulate classic and structured mobile interfaces according to the specifications of the design provided. It offers fluid navigation between videos, direct search of content, individual channel views, dynamic comments, and full multilingual support in Spanish, English, and Portuguese. It integrates the YouTube v3 API to fetch real-world data asynchronously.",
                duration: "Duration",
                noResults: "No matching videos found.",
                fallbackVideoTitle: "Simulated Video Title",
                fallbackDesc: "Example description for this demonstration video. Shows how text adapts to a limited height container of two lines that is trimmed with ellipsis.",
                fallbackChannelDesc: "Informative description of the channel. Here you will find the creator's main content, primary topics, and more details truncated to two lines with dots.",
                configTitle: "Settings"
            },
            Português: {
                searchPlaceholder: "Buscar...",
                likes: "Curtidas",
                views: "Visualizações",
                subscribers: "Inscritos",
                videoViews: "Visualizações do canal",
                uploads: "Envios",
                channelUploads: "Envios do canal",
                comments: "Comentários",
                language: "Idioma",
                about: "Sobre",
                aboutText: "Esta aplicação é um clone comemorativo do YouTube otimizado para simular interfaces móveis clássicas e estruturadas de acordo com as especificações do design fornecido. Oferece navegação fluida entre vídeos, busca direta de conteúdo, visualizações de canais individuais, comentários dinâmicos e suporte multilíngue completo em espanhol, inglês e português. Integra a API do YouTube v3 para obter dados do mundo real de forma após-síncrona.",
                duration: "Duração",
                noResults: "Nenhum vídeo correspondente encontrado.",
                fallbackVideoTitle: "Título do vídeo simulado",
                fallbackDesc: "Descrição de exemplo para este vídeo de demonstração. Mostra como o texto se adapta a um contêiner de altura limitada de duas linhas que se corta com três pontos.",
                fallbackChannelDesc: "Descrição informativa do canal. Aqui explica-se o conteúdo do criador, a temática principal do canal e mais detalhes importantes recortados a duas linhas com pontos.",
                configTitle: "Configurações"
            }
        };

        const generateMockVideos = (lang) => {
            const list = [];
            const titles = {
                Español: ["Increíble tutorial de programación paso a paso", "Música relajante para estudiar y concentrarse", "Cómo viajar barato por el mundo este año", "Los secretos mejores guardados de la ciencia espacial", "Receta fácil y rápida: El mejor postre casero"],
                English: ["Amazing step by step programming tutorial", "Relaxing music for studying and concentration", "How to travel cheap around the world this year", "The best kept secrets of space science", "Easy and fast recipe: The best homemade dessert"],
                Português: ["Incrível tutorial de programação passo a passo", "Música relaxante para estudar e focar", "Como viajar barato pelo mundo este ano", "Os segredos mais bem guardados da ciência espacial", "Receita rápida e fácil: A melhor sobremesa caseira"]
            };
            const currentTitles = titles[lang] || titles["Español"];

            for (let i = 1; i <= 90; i++) {
                const titleIndex = (i - 1) % currentTitles.length;
                list.push({
                    id: `mock-video-${i}`,
                    title: `${currentTitles[titleIndex]} #${i}`,
                    likes: (1200 + i * 34).toLocaleString(),
                    views: (15000 + i * 278).toLocaleString(),
                    date: `1${(i % 9)}/05/2026`,
                    duration: `0${(i % 5) + 2}:${(i % 45) + 10}:15`,
                    channelName: `@canal_creador_${i}`,
                    channelId: `channel-${i}`,
                    description: `Este es el video número ${i}. Un contenido sensacional diseñado para entretener y educar a toda nuestra comunidad. Suscríbete para no perderte ningún detalle sobre nuestros próximos lanzamientos semanales. #tecnologia #tutoriales #entretenimiento`,
                    comments: [
                        { author: `@usuario_premium_${i}`, text: "Que buen video" },
                        { author: `@entusiasta_retro`, text: "Excelente calidad de explicación, gracias." },
                        { author: `@espectador_anonimo`, text: "Me encantó la duración y la forma en la que presentas el contenido." },
                        { author: `@curioso_web`, text: "Muy buen video, lo veré de nuevo." }
                    ],
                    thumbnail: ""
                });
            }
            return list;
        };

        const getMockChannel = (channelHandle, lang) => {
            return {
                name: channelHandle,
                subscribers: "450K",
                videoViews: "24.5M",
                uploads: "135",
                description: `${translations[lang].fallbackChannelDesc} Creador enfocado en brindar el mejor entretenimiento clásico para nostálgicos. #videos #clasico`,
                avatar: ""
            };
        };

        function App() {
            const [currentLanguage, setCurrentLanguage] = React.useState("Español");
            const [currentPage, setCurrentPage] = React.useState("home");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedVideo, setSelectedVideo] = React.useState(null);
            const [selectedChannel, setSelectedChannel] = React.useState(null);
            const [videos, setVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState("");
            const [playIframe, setPlayIframe] = React.useState(false);

            const t = translations[currentLanguage];

            const fetchVideos = async (query = "") => {
                setLoading(true);
                setErrorMsg("");

                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API") {
                    let mockList = generateMockVideos(currentLanguage);
                    if (query.trim() !== "") {
                        mockList = mockList.filter(v =>
                            v.title.toLowerCase().includes(query.toLowerCase()) ||
                            v.description.toLowerCase().includes(query.toLowerCase())
                        );
                    }
                    setVideos(mockList.slice(0, 90));
                    setLoading(false);
                    return;
                }

                try {
                    let url = "";
                    if (query.trim() === "") {
                        url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&key=${YOUTUBE_API_KEY}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Error fetching data from YouTube API");
                    const data = await response.json();

                    let items = data.items || [];

                    if (query.trim() !== "" && items.length > 0) {
                        const videoIds = items.map(item => item.id.videoId).filter(Boolean).join(",");
                        const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                        const statsResponse = await fetch(statsUrl);
                        if (statsResponse.ok) {
                            const statsData = await statsResponse.json();
                            items = statsData.items || [];
                        }
                    }

                    const formattedVideos = items.map(item => {
                        const durationISO = item.contentDetails?.duration || "PT3M15S";
                        const duration = parseISODuration(durationISO);

                        return {
                            id: item.id,
                            title: item.snippet?.title || t.fallbackVideoTitle,
                            likes: parseInt(item.statistics?.likeCount || 0).toLocaleString(),
                            views: parseInt(item.statistics?.viewCount || 0).toLocaleString(),
                            date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                            duration: duration,
                            channelName: `@${item.snippet?.channelTitle.replace(/\s+/g, "_")}` || "@nombre_del_canal",
                            channelId: item.snippet?.channelId,
                            description: item.snippet?.description || t.fallbackDesc,
                            thumbnail: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
                            comments: []
                        };
                    });

                    let finalVideos = formattedVideos;
                    if (query.trim() === "" && finalVideos.length < 90) {
                        const needed = 90 - finalVideos.length;
                        const mockBackup = generateMockVideos(currentLanguage);
                        finalVideos = [...finalVideos, ...mockBackup.slice(0, needed)];
                    }

                    setVideos(finalVideos.slice(0, 90));

                } catch (err) {
                    console.error(err);
                    let mockList = generateMockVideos(currentLanguage);
                    if (query.trim() !== "") {
                        mockList = mockList.filter(v => v.title.toLowerCase().includes(query.toLowerCase()));
                    }
                    setVideos(mockList.slice(0, 90));
                } finally {
                    setLoading(false);
                }
            };

            const parseISODuration = (isoString) => {
                const match = isoString.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                if (!match) return "00:00:00";
                const hours = parseInt(match[1] || 0);
                const minutes = parseInt(match[2] || 0);
                const seconds = parseInt(match[3] || 0);
                const pad = (n) => String(n).padStart(2, "0");
                return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            };

            const fetchComments = async (videoId) => {
                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API" || !videoId || videoId.startsWith("mock")) {
                    return;
                }
                try {
                    const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=15&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        const fetchedComments = (data.items || []).map(item => ({
                            author: `@${item.snippet.topLevelComment.snippet.authorDisplayName.replace(/\s+/g, "_")}`,
                            text: item.snippet.topLevelComment.snippet.textDisplay
                        }));
                        setSelectedVideo(prev => prev ? { ...prev, comments: fetchedComments } : null);
                    }
                } catch (err) {
                    console.error("Error fetching comments:", err);
                }
            };

            const fetchChannelDetails = async (channelId, channelHandle) => {
                setLoading(true);
                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "AIzaSyC6fHHTGlkndc4wsDgKRinMQUJVwqd-Xo0" || !channelId || channelId.startsWith("channel")) {
                    const mockChan = getMockChannel(channelHandle, currentLanguage);
                    setSelectedChannel({
                        ...mockChan,
                        videos: generateMockVideos(currentLanguage).slice(0, 6)
                    });
                    setCurrentPage("channel");
                    setLoading(false);
                    return;
                }

                try {
                    const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(chanUrl);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const item = data.items?.[0];

                    const videosUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=20&order=date&type=video&key=${YOUTUBE_API_KEY}`;
                    const resVideos = await fetch(videosUrl);
                    let channelVideos = [];
                    if (resVideos.ok) {
                        const dataV = await resVideos.json();
                        channelVideos = (dataV.items || []).map(v => ({
                            id: v.id.videoId,
                            title: v.snippet.title,
                            likes: "12K+",
                            views: "320K+",
                            date: new Date(v.snippet.publishedAt).toLocaleDateString(),
                            duration: "05:12",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: v.snippet.description,
                            thumbnail: v.snippet.thumbnails?.high?.url || ""
                        }));
                    }

                    setSelectedChannel({
                        name: channelHandle,
                        subscribers: parseInt(item?.statistics?.subscriberCount || 0).toLocaleString(),
                        videoViews: parseInt(item?.statistics?.viewCount || 0).toLocaleString(),
                        uploads: parseInt(item?.statistics?.videoCount || 0).toLocaleString(),
                        description: item?.snippet?.description || t.fallbackChannelDesc,
                        avatar: item?.snippet?.thumbnails?.high?.url || "",
                        videos: channelVideos
                    });

                    setCurrentPage("channel");
                } catch (err) {
                    const mockChan = getMockChannel(channelHandle, currentLanguage);
                    setSelectedChannel({
                        ...mockChan,
                        videos: generateMockVideos(currentLanguage).slice(0, 6)
                    });
                    setCurrentPage("channel");
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchVideos(searchQuery);
            }, [currentLanguage]);

            const handleSearch = (e) => {
                if (e) e.preventDefault();
                fetchVideos(searchQuery);
                setCurrentPage("search");
            };

            const handleVideoClick = (video) => {
                setSelectedVideo(video);
                setPlayIframe(false);
                setCurrentPage("player");
                if (video.id.startsWith("mock") || !video.id) {
                    setSelectedVideo(video);
                } else {
                    fetchComments(video.id);
                }
            };

            const handleChannelClick = (channelId, channelName) => {
                fetchChannelDetails(channelId, channelName);
            };

            const changeLanguage = (lang) => {
                setCurrentLanguage(lang);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black border-x border-gray-800 flex flex-col justify-between">
                    <div>
                        <header className="bg-gray-700 text-white font-bold text-lg px-3 py-2 border-b-2 border-black tracking-wide">
                            YouTube
                        </header>

                        <div className="bg-black p-2 flex items-center justify-between gap-2 border-b border-gray-900">
                            <form onSubmit={handleSearch} className="flex flex-1 items-center gap-2">
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder={t.searchPlaceholder}
                                    className="flex-1 bg-white text-black font-semibold px-2 py-1.5 text-base rounded-none placeholder-gray-400"
                                />
                                <button
                                    type="submit"
                                    className="bg-neutral-400 hover:bg-neutral-500 text-black px-4 py-1.5 font-bold border border-neutral-500 rounded-none transition"
                                >
                                    &nbsp;
                                </button>
                            </form>

                            <div
                                onClick={() => setCurrentPage("config")}
                                className="vertical-dots pl-1 py-1"
                                title={t.configTitle}
                            >
                                <div></div>
                                <div></div>
                                <div></div>
                            </div>
                        </div>

                        {loading && (
                            <div className="text-center p-6 text-yellow-400 font-bold">
                                CARGANDO...
                            </div>
                        )}

                        {(currentPage === "home" || currentPage === "search") && !loading && (
                            <div className="p-2 space-y-4">
                                {videos.length === 0 ? (
                                    <div className="text-center text-gray-500 py-10 font-semibold">
                                        {t.noResults}
                                    </div>
                                ) : (
                                    videos.map((video, index) => (
                                        <div
                                            key={`${video.id}-${index}`}
                                            className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1.5 transition"
                                            onClick={() => handleVideoClick(video)}
                                        >
                                            <div className="w-32 h-20 bg-white flex-shrink-0 flex items-center justify-center border border-gray-400 overflow-hidden relative">
                                                {video.thumbnail ? (
                                                    <img
                                                        src={video.thumbnail}
                                                        alt={video.title}
                                                        className="w-full h-full object-cover"
                                                        onError={(e) => { e.target.style.display = 'none'; }}
                                                    />
                                                ) : (
                                                    <span className="text-xs text-black font-mono">Image</span>
                                                )}
                                                <span className="absolute bottom-0.5 right-0.5 bg-black/80 text-[10px] text-white px-1 font-mono">
                                                    {video.duration}
                                                </span>
                                            </div>

                                            <div className="flex-1 text-white text-[13px] leading-tight flex flex-col justify-start">
                                                <h3 className="font-bold text-[14px] line-clamp-2 leading-snug">{video.title}</h3>
                                                <p className="mt-1 font-semibold"># {t.likes}: {video.likes}</p>
                                                <p className="font-semibold"># {t.views}: {video.views}</p>
                                                <p className="text-gray-400 font-medium">{video.date}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {currentPage === "player" && selectedVideo && !loading && (
                            <div className="p-2">
                                <div className="flex gap-3 items-start mb-3">
                                    <div className="w-1/2 flex-shrink-0">
                                        {!playIframe ? (
                                            <div
                                                onClick={() => setPlayIframe(true)}
                                                className="w-full aspect-[4/3] bg-white text-black flex flex-col justify-center items-center cursor-pointer relative group border border-gray-300"
                                            >
                                                {selectedVideo.thumbnail ? (
                                                    <img
                                                        src={selectedVideo.thumbnail}
                                                        alt={selectedVideo.title}
                                                        className="w-full h-full object-cover"
                                                    />
                                                ) : (
                                                    <div className="w-12 h-9 bg-zinc-800 text-white flex items-center justify-center rounded shadow-md group-hover:scale-110 transition">
                                                        <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24">
                                                            <path d="M8 5v14l11-7z"/>
                                                        </svg>
                                                    </div>
                                                )}
                                                <span className="absolute bottom-1 right-1 bg-zinc-850/90 text-white font-mono text-[9px] px-1 py-0.5 border border-zinc-600">
                                                    {selectedVideo.duration}
                                                </span>
                                            </div>
                                        ) : (
                                            <div className="w-full aspect-[4/3] bg-black border border-gray-700">
                                                {selectedVideo.id && !selectedVideo.id.startsWith("mock") ? (
                                                    <iframe
                                                        className="w-full h-full"
                                                        src={`https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1`}
                                                        title={selectedVideo.title}
                                                        frameBorder="0"
                                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                        allowFullScreen
                                                    ></iframe>
                                                ) : (
                                                    <div className="w-full h-full flex flex-col items-center justify-center text-center p-1.5 bg-zinc-900">
                                                        <p className="text-yellow-400 font-bold text-[10px] mb-1 leading-tight">Simulador Activo</p>
                                                        <button
                                                            onClick={() => setPlayIframe(false)}
                                                            className="bg-white text-black px-1.5 py-0.5 font-bold text-[9px] hover:bg-zinc-200"
                                                        >
                                                            Cerrar
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="w-1/2 text-[12px] text-white leading-tight space-y-1 flex flex-col justify-start">
                                        <h2 className="font-bold text-[13px] text-white line-clamp-3 leading-snug mb-0.5">
                                            {selectedVideo.title}
                                        </h2>
                                        <p className="font-semibold"># {t.likes}: {selectedVideo.likes}</p>
                                        <p className="font-semibold"># {t.views}: {selectedVideo.views}</p>
                                        <p
                                            className="text-white hover:underline cursor-pointer font-bold text-[13px] mt-1"
                                            onClick={() => handleChannelClick(selectedVideo.channelId, selectedVideo.channelName)}
                                        >
                                            {selectedVideo.channelName}
                                        </p>
                                        <p className="text-gray-400 text-[11px] font-medium">{selectedVideo.date}</p>
                                    </div>
                                </div>

                                <div className="mt-3 py-2 border-t border-gray-800">
                                    <p className="text-gray-300 text-[12px] leading-relaxed line-clamp-2 overflow-hidden text-ellipsis">
                                        {selectedVideo.description || t.fallbackDesc}...
                                    </p>
                                </div>

                                <div className="mt-3">
                                    <div className="bg-gray-700 font-bold px-2 py-1.5 text-sm tracking-wider border-b border-black">
                                        {t.comments}
                                    </div>
                                    <div className="mt-2 space-y-3 pl-1">
                                        {selectedVideo.comments && selectedVideo.comments.length > 0 ? (
                                            selectedVideo.comments.map((comm, idx) => (
                                                <div key={idx} className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">{comm.author}</p>
                                                    <p className="text-white font-medium text-[13px]">{comm.text}</p>
                                                </div>
                                            ))
                                        ) : (
                                            <>
                                                <div className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">{selectedVideo.channelName}</p>
                                                    <p className="text-white font-medium text-[13px]">Que buen video</p>
                                                </div>
                                                <div className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">@nombre_del_canal</p>
                                                    <p className="text-white font-medium text-[13px]">Que buen video</p>
                                                </div>
                                                <div className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">@nombre_del_canal</p>
                                                    <p className="text-white font-medium text-[13px]">Que buen video</p>
                                                </div>
                                                <div className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">@nombre_del_canal</p>
                                                    <p className="text-white font-medium text-[13px]">Que buen video</p>
                                                </div>
                                                <div className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">@nombre_del_canal</p>
                                                    <p className="text-white font-medium text-[13px]">Que buen video</p>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "channel" && selectedChannel && !loading && (
                            <div className="p-2">
                                <div className="flex gap-4 items-start mb-3">
                                    <div className="w-24 h-24 bg-white border border-gray-400 flex-shrink-0 flex items-center justify-center overflow-hidden">
                                        {selectedChannel.avatar ? (
                                            <img src={selectedChannel.avatar} alt={selectedChannel.name} className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-black font-bold text-xs">Avatar</span>
                                        )}
                                    </div>

                                    <div className="text-[13px] text-white space-y-0.5 leading-snug">
                                        <h2 className="font-bold text-lg leading-tight mb-1">{selectedChannel.name}</h2>
                                        <p className="font-semibold"># {t.subscribers}: {selectedChannel.subscribers}</p>
                                        <p className="font-semibold"># {t.videoViews}: {selectedChannel.videoViews}</p>
                                        <p className="font-semibold"># {t.uploads}: {selectedChannel.uploads}</p>
                                    </div>
                                </div>

                                <div className="py-2 border-t border-gray-800">
                                    <p className="text-gray-300 text-[12px] leading-relaxed line-clamp-2 overflow-hidden text-ellipsis">
                                        {selectedChannel.description}...
                                    </p>
                                </div>

                                <div className="mt-3">
                                    <div className="bg-gray-700 font-bold px-2 py-1.5 text-sm tracking-wider border-b border-black">
                                        {t.channelUploads}
                                    </div>
                                    <div className="mt-2 space-y-4">
                                        {selectedChannel.videos.map((video, idx) => (
                                            <div
                                                key={`${video.id}-${idx}`}
                                                className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1 transition"
                                                onClick={() => handleVideoClick(video)}
                                            >
                                                <div className="w-28 h-16 bg-white flex-shrink-0 flex items-center justify-center overflow-hidden relative border border-gray-400">
                                                    {video.thumbnail ? (
                                                        <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" />
                                                    ) : (
                                                        <span className="text-xs text-black font-mono">Video</span>
                                                    )}
                                                </div>
                                                <div className="text-[12px] text-white leading-tight">
                                                    <h4 className="font-bold line-clamp-1">{video.title}</h4>
                                                    <p className="font-semibold"># {t.likes}: {video.likes}</p>
                                                    <p className="font-semibold"># {t.views}: {video.views}</p>
                                                    <p className="text-gray-400 text-[10px]">{video.date}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "config" && (
                            <div className="p-3 space-y-6">
                                <div>
                                    <h2 className="text-lg font-bold border-b border-gray-800 pb-1 mb-3">{t.language}</h2>
                                    <div className="flex gap-2">
                                        {["Español", "English", "Português"].map((lang) => (
                                            <button
                                                key={lang}
                                                onClick={() => changeLanguage(lang)}
                                                className={`px-3 py-1.5 font-bold border text-sm transition rounded-none ${
                                                    currentLanguage === lang
                                                    ? "bg-white text-black border-white"
                                                    : "bg-transparent text-white border-zinc-500 hover:bg-zinc-900"
                                                }`}
                                            >
                                                {lang}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-lg font-bold border-b border-gray-800 pb-1 mb-2">{t.about}</h2>
                                    <p className="text-sm text-gray-300 leading-relaxed text-justify">
                                        {t.aboutText}
                                    </p>
                                </div>
                            </div>
                        )}

                    </div>

                    <footer className="p-3 border-t border-gray-900 text-center">
                        <button
                            onClick={() => {
                                setSearchQuery("");
                                setCurrentPage("home");
                                fetchVideos("");
                            }}
                            className="bg-zinc-800 text-zinc-300 px-4 py-1.5 font-bold hover:bg-zinc-700 text-xs tracking-wider transition rounded-none uppercase border border-zinc-700"
                        >
                            {currentLanguage === "Español" ? "Volver al Inicio" : currentLanguage === "English" ? "Back to Home" : "Voltar ao Início"}
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
