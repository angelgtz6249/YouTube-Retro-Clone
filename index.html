            const [currentLanguage, setCurrentLanguage] = React.useState("Español");
            const [currentPage, setCurrentPage] = React.useState("home");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedVideo, setSelectedVideo] = React.useState(null);
            const [selectedChannel, setSelectedChannel] = React.useState(null);
            const [videos, setVideos] = React.useState([]);
            const [suggestedVideos, setSuggestedVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [playIframe, setPlayIframe] = React.useState(false);
            const [isSimulated, setIsSimulated] = React.useState(false);
            const [holoEnabled, setHoloEnabled] = React.useState(false);
            const [shareMenuOpen, setShareMenuOpen] = React.useState(false);
            const [manifestIconUrl, setManifestIconUrl] = React.useState("icon.png");
            
            const [showErrorModal, setShowErrorModal] = React.useState(false);
            const [lastFailedAction, setLastFailedAction] = React.useState(null);

            const [pageHistory, setPageHistory] = React.useState(["home"]);
            const [footerMenuOpen, setFooterMenuOpen] = React.useState(false);
            
            // Estados añadidos e integrados con localStorage
            const [subscribedChannels, setSubscribedChannels] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_subs");
                return saved ? JSON.parse(saved) : [];
            });
            const [favoriteVideos, setFavoriteVideos] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_favs");
                return saved ? JSON.parse(saved) : [];
            });
            const [watchHistory, setWatchHistory] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_history");
                return saved ? JSON.parse(saved) : [];
            });
            const [historyPaused, setHistoryPaused] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_history_paused");
                return saved ? JSON.parse(saved) === "true" : false;
            });
            const [searchHistory, setSearchHistory] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_search_history");
                return saved ? JSON.parse(saved) : [];
            });
            const [incognitoEnabled, setIncognitoEnabled] = React.useState(() => {
                const saved = localStorage.getItem("yt_retro_incognito");
                return saved ? JSON.parse(saved) === "true" : false;
            });

            const [selectedHistoryVideos, setSelectedHistoryVideos] = React.useState([]);
            const [activeSubMenu, setActiveSubMenu] = React.useState(null);
            const [isLandscape, setIsLandscape] = React.useState(window.innerWidth > window.innerHeight);

            // Recomendaciones fijas globales simuladas de términos buscados de usuarios (5 términos)
            const globalKeywords = ["Minecraft 2012 alpha", "Gangnam Style live", "iPhone 5 review", "Retro gaming setup", "Harlem Shake original"];

            const searchInputRef = React.useRef(null);
            const playbackTimerRef = React.useRef(null);

            const t = translations[currentLanguage];

            React.useEffect(() => {
                const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
                window.addEventListener("resize", handleResize);
                return () => window.removeEventListener("resize", handleResize);
            }, []);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_subs", JSON.stringify(subscribedChannels));
            }, [subscribedChannels]);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_favs", JSON.stringify(favoriteVideos));
            }, [favoriteVideos]);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_history", JSON.stringify(watchHistory));
            }, [watchHistory]);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_history_paused", historyPaused.toString());
            }, [historyPaused]);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_search_history", JSON.stringify(searchHistory));
            }, [searchHistory]);

            React.useEffect(() => {
                localStorage.setItem("yt_retro_incognito", incognitoEnabled.toString());
            }, [incognitoEnabled]);

            // Manejo del contador de 1 segundo en el reproductor para añadir al historial
            React.useEffect(() => {
                if (currentPage === "player" && selectedVideo && !historyPaused && !incognitoEnabled) {
                    playbackTimerRef.current = setTimeout(() => {
                        setWatchHistory(prev => {
                            const exists = prev.some(v => v.id === selectedVideo.id);
                            if (exists) return prev;
                            return [selectedVideo, ...prev];
                        });
                    }, 1000);
                }
                return () => {
                    if (playbackTimerRef.current) clearTimeout(playbackTimerRef.current);
                };
            }, [currentPage, selectedVideo, historyPaused, incognitoEnabled]);

            React.useEffect(() => {
                fetch('manifest.json')
                    .then(res => {
                        if (res.ok) return res.json();
                        throw new Error();
                    })
                    .then(data => {
                        if (data && data.icons && data.icons.length > 0) {
                            const iconSrc = data.icons[0].src;
                            setManifestIconUrl(iconSrc);
                            
                            let link = document.querySelector("link[rel~='icon']");
                            if (!link) {
                                link = document.createElement('link');
                                link.rel = 'icon';
                                document.getElementsByTagName('head')[0].appendChild(link);
                            }
                            link.href = iconSrc;
                        }
                    })
                    .catch(() => {
                        setManifestIconUrl("icon.png");
                    });
            }, []);

            React.useEffect(() => {
                if (searchInputRef.current && (currentPage === "home" || currentPage === "search")) {
                    searchInputRef.current.focus();
                }
            }, [currentPage]);

            const triggerError = (retryCallback) => {
                setLastFailedAction(() => retryCallback);
                setShowErrorModal(true);
            };

            const handleRetry = () => {
                setShowErrorModal(false);
                if (lastFailedAction) {
                    lastFailedAction();
                }
            };

            const navigateTo = (page) => {
                setPageHistory(prev => [...prev, page]);
                setCurrentPage(page);
                setFooterMenuOpen(false);
                setShareMenuOpen(false);
                setActiveSubMenu(null);
            };

            const goBack = () => {
                if (pageHistory.length > 1) {
                    const newHistory = [...pageHistory];
                    newHistory.pop();
                    const previousPage = newHistory[newHistory.length - 1];
                    setPageHistory(newHistory);
                    setCurrentPage(previousPage);
                    setShareMenuOpen(false);
                    setFooterMenuOpen(false);
                    setActiveSubMenu(null);
                }
            };

            const generateSimulatedVideos = (query = "", count = 50, suffix = "Falso") => {
                const simulatedList = [];
                const baseTitle = query.trim() !== "" ? `Simulado (${query})` : `Video Simulado ${suffix}`;
                for (let i = 1; i <= count; i++) {
                    simulatedList.push({
                        id: `simulated-id-${suffix}-${i}-${Math.floor(Math.random()*1000)}`,
                        title: `${baseTitle} #${i} - Contenido de demostración con interfaz clásica estructurada`,
                        likes: Math.floor(Math.random() * 5000).toLocaleString(),
                        views: Math.floor(Math.random() * 500000).toLocaleString(),
                        date: new Date(Date.now() - i * 24 * 60 * 60 * 1000).toLocaleDateString(),
                        duration: `${Math.floor(Math.random() * 9) + 1}:${Math.floor(Math.random() * 50) + 10}`,
                        channelName: `@canal_simulado_${i}`,
                        channelId: `sim-chan-${i}`,
                        description: `Esta es una descripción falsa simulada para el video #${i}.`,
                        thumbnail: "",
                        comments: [
                            { author: "@usuario_retro_1", text: "Excelente simulacro de la aplicación móvil original." }
                        ]
                    });
                }
                return simulatedList;
            };

            const fetchVideos = async (query = "") => {
                setLoading(true);

                if (isSimulated) {
                    setVideos(generateSimulatedVideos(query, 50, "Falso"));
                    setLoading(false);
                    return;
                }

                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API") {
                    setVideos([]);
                    setLoading(false);
                    triggerError(() => fetchVideos(query));
                    return;
                }

                try {
                    let url = "";
                    if (query.trim() === "") {
                        url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&key=${YOUTUBE_API_KEY}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error();
                    const data = await response.json();

                    let items = data.items || [];

                    if (query.trim() !== "" && items.length > 0) {
                        const videoIds = items.map(item => item.id?.videoId).filter(Boolean).join(",");
                        if (videoIds) {
                            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                            const statsResponse = await fetch(statsUrl);
                            if (statsResponse.ok) {
                                const statsData = await statsResponse.json();
                                items = statsData.items || [];
                            }
                        }
                    }

                    const formattedVideos = items.map(item => {
                        const durationISO = item.contentDetails?.duration || "PT3M15S";
                        const duration = parseISODuration(durationISO);
                        const finalId = item.id?.videoId || item.id;

                        return {
                            id: typeof finalId === 'object' ? finalId.videoId : finalId,
                            title: item.snippet?.title || t.fallbackVideoTitle,
                            likes: parseInt(item.statistics?.likeCount || 0).toLocaleString(),
                            views: parseInt(item.statistics?.viewCount || 0).toLocaleString(),
                            date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                            duration: duration,
                            channelName: item.snippet?.channelTitle ? `@${item.snippet.channelTitle.replace(/\s+/g, "_")}` : "@canal",
                            channelId: item.snippet?.channelId,
                            description: item.snippet?.description || t.fallbackDesc,
                            thumbnail: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
                            comments: []
                        };
                    });

                    setVideos(formattedVideos);

                } catch (err) {
                    setVideos([]);
                    triggerError(() => fetchVideos(query));
                } finally {
                    setLoading(false);
                }
            };

            const fetchSuggestions = async (video) => {
                if (isSimulated) {
                    setSuggestedVideos(generateSimulatedVideos(video.title, 25, "Sugerido"));
                    return;
                }
                try {
                    const cleanKeyword = video.title.split(" ").slice(0, 3).join(" ");
                    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(cleanKeyword)}&type=video&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const items = data.items || [];
                    const formatted = items.map(item => ({
                        id: item.id?.videoId,
                        title: item.snippet?.title || t.fallbackVideoTitle,
                        likes: Math.floor(Math.random()*1200).toLocaleString(),
                        views: Math.floor(Math.random()*90000).toLocaleString(),
                        date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                        duration: "03:45",
                        channelName: item.snippet?.channelTitle ? `@${item.snippet.channelTitle.replace(/\s+/g, "_")}` : "@canal",
                        channelId: item.snippet?.channelId,
                        description: item.snippet?.description || t.fallbackDesc,
                        thumbnail: item.snippet?.thumbnails?.medium?.url || ""
                    }));
                    setSuggestedVideos(formatted);
                } catch (e) {
                    setSuggestedVideos([]);
                    triggerError(() => fetchSuggestions(video));
                }
            };

            const parseISODuration = (isoString) => {
                const match = isoString.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                if (!match) return "00:00:00";
                const hours = parseInt(match[1] || 0);
                const minutes = parseInt(match[2] || 0);
                const seconds = parseInt(match[3] || 0);
                const pad = (n) => String(n).padStart(2, "0");
                return hours > 0 ? `${pad(hours)}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
            };

            const fetchComments = async (videoId) => {
                if (isSimulated || !YOUTUBE_API_KEY || !videoId) return;
                try {
                    const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=15&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        const fetchedComments = (data.items || []).map(item => ({
                            author: `@${item.snippet.topLevelComment.snippet.authorDisplayName.replace(/\s+/g, "_")}`,
                            text: item.snippet.topLevelComment.snippet.textDisplay
                        }));
                        setSelectedVideo(prev => prev ? { ...prev, comments: fetchedComments } : null);
                    }
                } catch (err) {
                    console.error("Error fetching comments:", err);
                }
            };

            const fetchChannelDetails = async (channelId, channelHandle) => {
                setLoading(true);
                if (!channelId) {
                    setLoading(false);
                    return;
                }

                if (isSimulated) {
                    const mockChannelVideos = [];
                    for (let i = 1; i <= 50; i++) {
                        mockChannelVideos.push({
                            id: `sim-chan-vid-${i}-${Math.random()}`,
                            title: `Subida simulada #${i} de este canal`,
                            likes: Math.floor(Math.random()*400).toLocaleString(),
                            views: Math.floor(Math.random()*25000).toLocaleString(),
                            date: new Date(Date.now() - i * 2 * 24 * 60 * 60 * 1000).toLocaleDateString(),
                            duration: "05:12",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: "Descripción simulada de video del canal.",
                            thumbnail: ""
                        });
                    }
                    setSelectedChannel({
                        id: channelId,
                        name: channelHandle,
                        subscribers: "250,000",
                        videoViews: "1,200,500",
                        uploads: "50",
                        description: "Esta es la biografía de un canal totalmente simulado.",
                        avatar: "",
                        publishedAt: "15/08/2012",
                        country: "México",
                        videos: mockChannelVideos
                    });
                    navigateTo("channel");
                    setLoading(false);
                    return;
                }

                try {
                    const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(chanUrl);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const item = data.items?.[0];

                    if (!item) throw new Error();

                    let allVideos = [];
                    let nextPageToken = "";
                    let fetchMore = true;

                    while (fetchMore) {
                        const videosUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=50&order=date&type=video&pageToken=${nextPageToken}&key=${YOUTUBE_API_KEY}`;
                        const resVideos = await fetch(videosUrl);
                        if (!resVideos.ok) throw new Error();
                        
                        const dataV = await resVideos.json();
                        const pageVideos = (dataV.items || []).map(v => ({
                            id: v.id?.videoId || v.id,
                            title: v.snippet?.title || t.fallbackVideoTitle,
                            likes: "---",
                            views: "Ver",
                            date: new Date(v.snippet?.publishedAt).toLocaleDateString(),
                            duration: "--:--",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: v.snippet?.description || t.fallbackDesc,
                            thumbnail: v.snippet?.thumbnails?.high?.url || v.snippet?.thumbnails?.medium?.url || ""
                        }));

                        allVideos = [...allVideos, ...pageVideos];
                        nextPageToken = dataV.nextPageToken;

                        if (!nextPageToken) {
                            fetchMore = false;
                        }
                    }

                    const rawDate = item?.snippet?.publishedAt;
                    const formattedDate = rawDate ? new Date(rawDate).toLocaleDateString('es-ES') : "Desconocido";
                    const countryName = item?.snippet?.country || null;

                    setSelectedChannel({
                        id: channelId,
                        name: channelHandle,
                        subscribers: parseInt(item?.statistics?.subscriberCount || 0).toLocaleString(),
                        videoViews: parseInt(item?.statistics?.viewCount || 0).toLocaleString(),
                        uploads: parseInt(item?.statistics?.videoCount || 0).toLocaleString(),
                        description: item?.snippet?.description || t.fallbackChannelDesc,
                        avatar: item?.snippet?.thumbnails?.high?.url || item?.snippet?.thumbnails?.medium?.url || "",
                        publishedAt: formattedDate,
                        country: countryName,
                        videos: allVideos
                    });

                    navigateTo("channel");
                } catch (err) {
                    console.error(err);
                    triggerError(() => fetchChannelDetails(channelId, channelHandle));
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchVideos(searchQuery);
            }, [currentLanguage, isSimulated]);

            // Mecánica e inserción en el historial de búsqueda dinámico de 3 niveles
            const handleSearch = (e) => {
                if (e) e.preventDefault();
                if (searchQuery.trim() !== "" && !incognitoEnabled) {
                    setSearchHistory(prev => {
                        const filtered = prev.filter(item => item !== searchQuery);
                        const newHistory = [searchQuery, ...filtered];
                        return newHistory.slice(0, 3);
                    });
                }
                fetchVideos(searchQuery);
                navigateTo("search");
            };

            const handleSearchTermClick = (term) => {
                setSearchQuery(term);
                if (!incognitoEnabled) {
                    setSearchHistory(prev => {
                        const filtered = prev.filter(item => item !== term);
                        const newHistory = [term, ...filtered];
                        return newHistory.slice(0, 3);
                    });
                }
                fetchVideos(term);
                navigateTo("search");
            };

            const handleVideoClick = (video) => {
                setSelectedVideo(video);
                setPlayIframe(false);
                setSuggestedVideos([]);
                navigateTo("player");
                
                if (video.id) {
                    fetchComments(video.id);
                    setTimeout(() => {
                        fetchSuggestions(video);
                    }, 2000); 
                }
            };

            const handleVideoClickFromList = (video) => {
                handleVideoClick(video);
            };

            const handleChannelClick = (channelId, channelName) => {
                if (channelId) {
                    fetchChannelDetails(channelId, channelName);
                }
            };

            const toggleSubscription = (channel) => {
                const isSubbed = subscribedChannels.some(c => c.id === channel.id);
                if (isSubbed) {
                    setSubscribedChannels(prev => prev.filter(c => c.id !== channel.id));
                } else {
                    setSubscribedChannels(prev => [...prev, { id: channel.id, name: channel.name }]);
                }
            };

            const toggleFavorite = (video) => {
                const isFav = favoriteVideos.some(v => v.id === video.id);
                if (isFav) {
                    setFavoriteVideos(prev => prev.filter(v => v.id !== video.id));
                } else {
                    setFavoriteVideos(prev => [...prev, video]);
                }
            };

            const handleShareAction = (type) => {
                const videoUrl = `https://www.youtube.com/watch?v=${selectedVideo.id}`;
                const encodedUrl = encodeURIComponent(videoUrl);
                const encodedTitle = encodeURIComponent(selectedVideo.title);

                if (type === "whatsapp") {
                    const text = encodeURIComponent(`¡Mira este video! ${videoUrl}`);
                    window.open(`https://api.whatsapp.com/send?text=${text}`, "_blank");
                } else if (type === "facebook") {
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`, "_blank");
                } else if (type === "twitter") {
                    window.open(`https://twitter.com/intent/tweet?url=${encodedUrl}&text=${encodedTitle}`, "_blank");
                } else if (type === "pinterest") {
                    window.open(`https://pinterest.com/pin/create/button/?url=${encodedUrl}&description=${encodedTitle}`, "_blank");
                } else if (type === "linkedin") {
                    window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodedUrl}`, "_blank");
                } else if (type === "copy") {
                    navigator.clipboard.writeText(videoUrl);
                    alert("¡Enlace copiado al portapapeles!");
                } else if (type === "mp4" || type === "mp3") {
                    // Ejecuta una descarga directa simulada sin enlaces externos
                    const fileExtension = type === "mp4" ? "mp4" : "mp3";
                    const blob = new Blob(["Archivo multimedia simulado"], { type: type === "mp4" ? "video/mp4" : "audio/mp3" });
                    const dlUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = dlUrl;
                    a.download = `video_retro_${selectedVideo.id || "file"}.${fileExtension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(dlUrl);
                }
                setShareMenuOpen(false);
            };

            // Acciones masivas e individuales para la página del Historial de reproducción
            const toggleSelectHistoryVideo = (id) => {
                setSelectedHistoryVideos(prev => 
                    prev.includes(id) ? prev.filter(vidId => vidId !== id) : [...prev, id]
                );
            };

            const handleSelectAllHistory = () => {
                if (selectedHistoryVideos.length === watchHistory.length) {
                    setSelectedHistoryVideos([]);
                } else {
                    setSelectedHistoryVideos(watchHistory.map(v => v.id));
                }
            };

            const handleClearAllHistory = () => {
                setWatchHistory([]);
                setSelectedHistoryVideos([]);
            };

            const handleDeleteSelectedHistory = () => {
                setWatchHistory(prev => prev.filter(v => !selectedHistoryVideos.includes(v.id)));
                setSelectedHistoryVideos([]);
            };

            const showSearchBar = currentPage === "home" || currentPage === "search";

            // Definición de estilos dinámicos para los botones del menú contextual cuadriculado
            const getGridItemClass = () => {
                if (holoEnabled) {

            return (

                        setFooterMenuOpen(false);
                        setShareMenuOpen(false);

                >
                    
                    {showErrorModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4 z-[9999]">

                                    <button

                                    >
                                        {t.retry}
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-zinc-900 border border-zinc-800 w-full max-w-xs flex flex-col overflow-hidden shadow-2xl">
                                    <div className="bg-white p-4">
                                        <p className="text-black text-sm font-semibold leading-normal">{t.apiError}</p>
                                    </div>
                                    <div className="bg-zinc-900 p-2.5 flex justify-end border-t border-zinc-800">
                                        <button
                                            onClick={handleRetry}
                                            className="bg-neutral-300 hover:bg-neutral-400 active:bg-neutral-500 text-black font-bold text-xs px-5 py-2 uppercase tracking-wide transition border border-neutral-400"
                                        >
                                            {t.retry}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div>
                        <header className={`text-white font-bold text-lg px-3 py-2 tracking-wide flex items-center gap-2 transition-all ${
                            holoEnabled ? "bg-zinc-950 border-b-2 border-[#33b5e5]" : "bg-gray-700 border-b-2 border-black"
                        }`}>
                            {holoEnabled && (
                                <img 
                                    src={manifestIconUrl} 
                                    alt="App Icon" 
                                    className="w-5 h-5 object-contain flex-shrink-0"
                                    onError={(e) => { e.target.src = "icon.png"; }}
                                />
                            )}
                            <span className={holoEnabled ? "text-[#33b5e5]" : "text-white"}>YouTube</span>
                        </header>

                        {showSearchBar && (
                            <div className="bg-black p-2 flex flex-col gap-2 border-b border-gray-900">
                                <form onSubmit={handleSearch} className="flex items-center gap-2">
                                    <div className={`flex flex-1 items-center relative ${
                                        holoEnabled 
                                        ? "bg-transparent border-b-2 border-[#33b5e5] before:content-[''] before:absolute before:left-0 before:bottom-0 before:w-0.5 before:h-2 before:bg-[#33b5e5] after:content-[''] after:absolute after:right-0 after:bottom-0 after:w-0.5 after:h-2 after:bg-[#33b5e5]" 
                                        : "bg-white"
                                    }`}>
                                        <input
                                            ref={searchInputRef}
                                            type="text"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            placeholder={t.searchPlaceholder}
                                            className={`flex-1 px-2 py-1.5 text-base rounded-none placeholder-gray-400 font-semibold ${
                                                holoEnabled ? "bg-transparent text-[#33b5e5]" : "bg-white text-black"
                                            }`}
                                        />
                                    </div>
                                    <button
                                        type="submit"
                                        className={`px-4 py-1.5 font-bold border rounded-none transition ${
                                            holoEnabled 
                                            ? "bg-zinc-800 text-[#33b5e5] border-[#33b5e5]/40 hover:bg-zinc-700" 
                                            : "bg-neutral-400 text-black border-neutral-500 hover:bg-neutral-500"
                                        }`}
                                    >
                                        &nbsp;
                                    </button>
                                </form>

                                {/* Visualización de los términos del historial de búsqueda */}
                                {searchHistory.length > 0 && (
                                    <div className="flex flex-col gap-1 mt-1">
                                        {searchHistory.map((term, index) => (
                                            <div 
                                                key={index}
                                                onClick={() => handleSearchTermClick(term)}
                                                className="bg-zinc-800 text-xs text-gray-300 px-2 py-1.5 cursor-pointer font-mono hover:bg-zinc-700 transition"
                                            >
                                                {term}
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Recomendaciones globales de palabras clave de otros usuarios */}
                                <div className="mt-1">
                                    <p className="text-[10px] text-zinc-500 uppercase tracking-wider font-bold mb-1">Recomendaciones clásicas:</p>
                                    <div className="flex flex-wrap gap-1">
                                        {globalKeywords.map((kw, idx) => (
                                            <span 
                                                key={idx}
                                                onClick={() => handleSearchTermClick(kw)}
                                                className="bg-zinc-900 border border-zinc-800 text-[10px] text-zinc-400 px-2 py-0.5 rounded-full cursor-pointer hover:text-white transition"
                                            >
                                                {kw}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {loading && (
                            <div className={`text-center p-6 font-bold ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                {currentLanguage === "Русский" ? "ЗАГРУЗКА..." : "CARGANDO..."}
                            </div>
                        )}

                        {(currentPage === "home" || currentPage === "search") && !loading && (
                            <div className="p-2 space-y-4 grid grid-cols-1 landscape:grid-cols-2 landscape:gap-6 landscape:space-y-0">
                                {videos.length === 0 ? (
                                    <div className="text-center text-gray-500 py-10 font-semibold landscape:col-span-2">
                                        {t.noResults}
                                    </div>
                                ) : (
                                    videos.map((video, index) => (
                                        <div
                                            key={`${video.id}-${index}`}
                                            className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1.5 transition w-full"
                                            onClick={() => handleVideoClickFromList(video)}
                                        >
                                            <div className="w-32 landscape:w-44 h-20 landscape:h-28 bg-zinc-950 flex-shrink-0 flex items-center justify-center border border-gray-700 overflow-hidden relative">
                                                {video.thumbnail ? (
                                                    <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" />
                                                ) : (
                                                    <span className="text-[10px] font-bold font-mono tracking-tighter uppercase p-1 text-center bg-white w-full h-full flex items-center justify-center select-none text-zinc-600">
                                                        {currentLanguage === "Русский" ? "Демо" : "Simulado"}
                                                    </span>
                                                )}
                                                <span className="absolute bottom-0.5 right-0.5 bg-black/80 text-[10px] text-white px-1 font-mono">
                                                    {video.duration}
                                                </span>
                                            </div>

                                            <div className="flex-1 text-white text-[13px] landscape:text-[15px] leading-tight flex flex-col justify-start">
                                                <h3 className="font-bold text-[14px] landscape:text-[16px] line-clamp-2 leading-snug">{video.title}</h3>
                                                <p className="mt-1 font-semibold"># {t.likes}: {video.likes}</p>
                                                <p className="font-semibold"># {t.views}: {video.views}</p>
                                                <p className="text-gray-400 font-medium">{video.date}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {currentPage === "player" && selectedVideo && !loading && (
                            <div className="p-2">
                                <div className="flex flex-row gap-3 landscape:gap-6 items-start mb-3">
                                    <div className="w-1/2 flex-shrink-0">
                                        <div className="w-full aspect-[4/3] bg-zinc-950 border border-gray-700 flex items-center justify-center relative overflow-hidden">
                                            {!playIframe ? (
                                                <div
                                                    onClick={() => setPlayIframe(true)}
                                                    className="w-full h-full text-black flex flex-col justify-center items-center cursor-pointer relative"
                                                >
                                                    {selectedVideo.thumbnail ? (
                                                        <img src={selectedVideo.thumbnail} alt={selectedVideo.title} className="w-full h-full object-cover" />
                                                    ) : (
                                                        <div className="w-full h-full bg-white flex items-center justify-center select-none">
                                                            <svg className="w-6 h-6 fill-zinc-700" viewBox="0 0 24 24">
                                                                <path d="M8 5v14l11-7z"/>
                                                            </svg>
                                                        </div>

                                                    <span className="absolute bottom-1 right-1 bg-black/80 text-white font-mono text-[9px] px-1 py-0.5">
                                                        {selectedVideo.duration}
                                                    </span>

                                                            <p className={`font-bold text-xs uppercase tracking-tight mb-2 ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                                                {t.simulatedModeActive}

                                                            <button
                                                                onClick={() => setPlayIframe(false)}
                                                                className="bg-zinc-700 text-white font-bold border border-zinc-500 px-3 py-1 text-[10px] tracking-wide uppercase hover:bg-zinc-600 transition"
                                                            >
                                                                {t.close}
                                                            </button>

                                                    ) : (

                                                                className="absolute inset-0 w-full h-full"
                                                                src={`https://www.youtube-nocookie.com/embed/${selectedVideo.id}?autoplay=1&modestbranding=1&rel=0`}

                                                                <p className="text-red-400 font-bold text-[10px] mb-1">ID Inválido</p>
                                                            </div>

                                                </div>
                                            )}
                                        </div>

                                    <div className="w-1/2 text-[12px] landscape:text-[14px] text-white leading-tight space-y-1 flex flex-col justify-start">
                                        <h2 className="font-bold text-[13px] landscape:text-[16px] text-white line-clamp-3 leading-snug mb-0.5">

                                        <p className="font-semibold"># {t.views}: {selectedVideo.views}</p>
                                        <p

                                            onClick={() => handleChannelClick(selectedVideo.channelId, selectedVideo.channelName)}

                                            {selectedVideo.channelName}

                                    <p className="text-gray-300 text-[12px] landscape:text-[14px] leading-relaxed">
                                        {selectedVideo.description}

                                    <div className="mt-3 flex flex-wrap items-center gap-x-5 gap-y-1.5">

                                                className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5] hover:text-cyan-300" : "text-yellow-400 hover:text-yellow-300"}`}
                                            >
                                                {t.share}
                                            </p>
                                        </div>

                                        <p 
                                            onClick={() => toggleFavorite(selectedVideo)}
                                            className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline inline-block ${holoEnabled ? "text-[#33b5e5] hover:text-cyan-300" : "text-yellow-400 hover:text-yellow-300"}`}
                                        >
                                            {favoriteVideos.some(v => v.id === selectedVideo.id) ? t.removeFromFavorites : t.addToFavorites}

                                </div>

                                {/* Menú contextual de Compartir cuadriculado adaptativo */}
                                {shareMenuOpen && (
                                    <div 
                                        onClick={(e) => e.stopPropagation()}
                                        className={`mt-2 p-2 w-full grid gap-2 z-50 ${
                                            isLandscape ? "grid-cols-6" : "grid-cols-3"
                                        } ${holoEnabled ? "bg-black/90 border-t border-[#33b5e5]" : "bg-neutral-100 border-t border-neutral-300"}`}
                                    >
                                        <button onClick={() => handleShareAction("whatsapp")} className={getGridItemClass()}>
                                            <span className="text-xs font-bold">{t.shareWhatsapp}</span>
                                        </button>
                                        <button onClick={() => handleShareAction("facebook")} className={getGridItemClass()}>
                                            <span className="text-xs font-bold">{t.shareFacebook}</span>
                                        </button>
                                        <button onClick={() => handleShareAction("twitter")} className={getGridItemClass()}>
                                            <span className="text-xs font-bold">{t.shareTwitter}</span>
                                        </button>
                                        <button onClick={() => handleShareAction("pinterest")} className={getGridItemClass()}>
                                            <span className="text-xs font-bold">{t.sharePinterest}</span>
                                        </button>
                                        <button onClick={() => handleShareAction("linkedin")} className={getGridItemClass()}>
                                            <span className="text-xs font-bold">{t.shareLinkedin}</span>
                                        </button>
                                        
                                        {/* Botón de Más con submenú integrado */}
                                        <div className="relative flex flex-col justify-center">
                                            <button 
                                                onClick={() => setActiveSubMenu(activeSubMenu === "more" ? null : "more")} 
                                                className={`${getGridItemClass()} w-full h-full`}
                                            >
                                                <svg className={`w-4 h-4 mb-0.5 ${getGridIconColorClass()}`} viewBox="0 0 24 24">
                                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 13l-4-4h8l-4 4z"/>
                                                </svg>
                                                <span className="text-[10px] font-bold">Más</span>
                                            </button>
                                            
                                            {activeSubMenu === "more" && (
                                                <div className={`absolute bottom-full left-0 mb-1 w-40 border-2 z-50 font-mono text-[11px] divide-y shadow-2xl ${
                                                    holoEnabled ? "bg-zinc-950 border-[#33b5e5] divide-zinc-800 text-[#33b5e5]" : "bg-white border-zinc-700 divide-gray-200 text-black"
                                                }`}>
                                                    <button onClick={() => handleShareAction("copy")} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.shareCopy}</button>
                                                    <button onClick={() => handleShareAction("mp3")} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.shareMp3}</button>
                                                    <button onClick={() => handleShareAction("mp4")} className="w-full text-left px-3 py-2 hover:bg-zinc-800 hover:text-white font-bold block">{t.shareMp4}</button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                <div className="mt-3">
                                    <div className={`${holoEnabled ? "bg-zinc-900 text-[#33b5e5] border-b border-[#33b5e5]" : "bg-gray-700 text-white border-b border-black"} font-bold px-2 py-1.5 text-sm tracking-wider flex justify-between items-center`}>
                                        <span>{t.suggestions}</span>
                                        <span className="text-[10px] bg-zinc-600 px-1.5 py-0.5 text-gray-300 font-mono">
                                            {suggestedVideos.length} {currentLanguage === "Русский" ? "ВИДЕО" : "VIDEOS"}
                                        </span>
                                    </div>
                                    <div className="mt-2 space-y-4 grid grid-cols-1 landscape:grid-cols-2 landscape:gap-4 landscape:space-y-0 border-b border-gray-900 pb-4">
                                        {suggestedVideos.length > 0 ? (
                                            suggestedVideos.map((video, idx) => (
                                                <div
                                                    key={`sug-${video.id}-${idx}`}
                                                    className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1 transition"
                                                    onClick={() => handleVideoClickFromList(video)}
                                                >
                                                    <div className="w-28 landscape:w-36 h-16 landscape:h-20 bg-zinc-950 flex-shrink-0 flex items-center justify-center overflow-hidden relative border border-gray-700">
                                                        {video.thumbnail ? (
                                                            <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" />
                                                        ) : (
                                                            <span className="text-[10px] text-zinc-400 font-bold font-mono tracking-tighter uppercase p-1 bg-white text-zinc-600 w-full h-full flex items-center justify-center">
                                                                {currentLanguage === "Русский" ? "Демо" : "Simulado"}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div className="text-[12px] landscape:text-[14px] text-white leading-tight flex-1">
                                                        <h4 className="font-bold line-clamp-1">{video.title}</h4>
                                                        <p className="font-semibold text-[10px] text-zinc-300"># {video.views} {t.views.toLowerCase()}</p>
                                                        <p className={`font-bold text-[11px] ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-500"}`}>{video.channelName}</p>
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-zinc-500 text-xs py-2 italic font-mono col-span-2 text-center">
                                                {currentLanguage === "Русский" ? "Загрузка рекомендаций..." : "Cargando sugerencias..."}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="mt-3">
                                    <div className={`font-bold px-2 py-1.5 text-sm tracking-wider ${holoEnabled ? "bg-zinc-900 text-[#33b5e5] border-b border-[#33b5e5]" : "bg-gray-700 text-white border-b border-black"}`}>
                                        {t.comments}
                                    </div>
                                    <div className="mt-2 space-y-3 pl-1">
                                        {selectedVideo.comments && selectedVideo.comments.length > 0 ? (
                                            selectedVideo.comments.map((comm, idx) => (
                                                <div key={idx} className="text-xs leading-normal">
                                                    <p className="text-zinc-400 font-bold block">{comm.author}</p>
                                                    <p className="text-white font-medium text-[13px] landscape:text-[14px]">{comm.text}</p>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-zinc-500 text-xs py-2 italic">
                                                {currentLanguage === "Русский" ? "Комментарии к этому видео отсутствуют." : "No hay comentarios disponibles en este video."}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "channel" && selectedChannel && !loading && (
                            <div className="p-2">
                                <div className={`relative overflow-hidden mb-2 ${holoEnabled ? "bg-transparent border-b border-[#33b5e5] pb-2" : "border border-gray-800"}`}>
                                    <div className="relative z-10 p-2 flex gap-4 items-start">
                                        <div className="w-24 h-24 bg-zinc-900 border border-gray-700 flex-shrink-0 flex items-center justify-center overflow-hidden">
                                            {selectedChannel.avatar ? (
                                                <img src={selectedChannel.avatar} alt={selectedChannel.name} className="w-full h-full object-cover" />
                                            ) : (
                                                <span className="text-zinc-600 font-bold text-xs uppercase font-mono">
                                                    {currentLanguage === "Русский" ? "Канал" : "Canal"}
                                                </span>
                                            )}
                                        </div>

                                        <div className="text-[13px] landscape:text-[15px] text-white flex flex-col leading-snug">
                                            <h2 className="font-bold text-lg landscape:text-2xl leading-tight mb-1">{selectedChannel.name}</h2>
                                            <p className="font-semibold"># {t.subscribers}: {selectedChannel.subscribers}</p>
                                            <p className="font-semibold"># {t.videoViews}: {selectedChannel.videoViews}</p>
                                            <p className="font-semibold"># {t.uploads}: {selectedChannel.uploads}</p>
                                            
                                            <p className="font-semibold mt-1 text-gray-300">• {t.createdDate}: {selectedChannel.publishedAt}</p>
                                            <p className="font-semibold text-gray-300">• {t.region}: {selectedChannel.country || t.unknown}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="py-2 border-t border-gray-800">
                                    <p className="text-gray-300 text-[12px] landscape:text-[14px] leading-relaxed mb-2">
                                        {selectedChannel.description}
                                    </p>

                                    <p 
                                        onClick={() => toggleSubscription(selectedChannel)}
                                        className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline inline-block ${holoEnabled ? "text-[#33b5e5] hover:text-cyan-300" : "text-yellow-400 hover:text-yellow-300"}`}
                                    >
                                        {subscribedChannels.some(c => c.id === selectedChannel.id) ? t.unsubscribe : t.subscribe}
                                    </p>
                                </div>

                                <div className="mt-3">
                                    <div className={`font-bold px-2 py-1.5 text-sm tracking-wider ${holoEnabled ? "bg-zinc-900 text-[#33b5e5] border-b border-[#33b5e5]" : "bg-gray-700 text-white border-b border-black"}`}>
                                        {t.channelUploads} ({selectedChannel.videos.length})
                                    </div>
                                    <div className="mt-2 space-y-4 grid grid-cols-1 landscape:grid-cols-2 landscape:gap-4 landscape:space-y-0">
                                        {selectedChannel.videos.length > 0 ? (
                                            selectedChannel.videos.map((video, idx) => (
                                                <div
                                                    key={`${video.id}-${idx}`}
                                                    className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1 transition"
                                                    onClick={() => handleVideoClickFromList(video)}
                                                >
                                                    <div className="w-28 landscape:w-36 h-16 landscape:h-20 bg-zinc-950 flex-shrink-0 flex items-center justify-center overflow-hidden relative border border-gray-700">
                                                        {video.thumbnail ? (
                                                            <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" />
                                                        ) : (
                                                            <span className="text-[10px] text-zinc-400 font-mono font-bold uppercase">
                                                                {currentLanguage === "Русский" ? "Видео" : "Video"}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div className="text-[12px] landscape:text-[14px] text-white leading-tight flex-1">
                                                        <h4 className="font-bold line-clamp-2">{video.title}</h4>
                                                        <p className="font-semibold text-zinc-400 text-[11px] mt-0.5">{video.date}</p>
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            <p className="text-zinc-500 text-xs italic p-2 col-span-2 text-center">
                                                {currentLanguage === "Русский" ? "Загруженные видео отсутствуют." : "No hay videos subidos disponibles."}
                                            </p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "subscriptions" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-3 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>{t.navSubs}</h2>
                                {subscribedChannels.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptySubs}</p>
                                ) : (
                                    <div className="space-y-2 font-mono">
                                        {subscribedChannels.map((chan) => (
                                            <div 
                                                key={chan.id} 
                                                onClick={() => fetchChannelDetails(chan.id, chan.name)}
                                                className={`p-2 border bg-zinc-950 hover:bg-zinc-900 cursor-pointer transition flex items-center ${holoEnabled ? "border-[#33b5e5]/40" : "border-zinc-800"}`}
                                            >
                                                <span className={`font-bold text-sm select-none ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                                    {chan.name}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === "favorites" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-3 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>{t.navFavs}</h2>
                                {favoriteVideos.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptyFavs}</p>
                                ) : (
                                    <div className="space-y-4 grid grid-cols-1 landscape:grid-cols-2 landscape:gap-6 landscape:space-y-0">
                                        {favoriteVideos.map((video, index) => (
                                            <div
                                                key={`fav-${video.id}-${index}`}
                                                className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1.5 transition w-full"
                                                onClick={() => handleVideoClickFromList(video)}
                                            >
                                                <div className="w-32 landscape:w-44 h-20 landscape:h-28 bg-zinc-950 flex-shrink-0 flex items-center justify-center border border-gray-700 overflow-hidden relative">
                                                    {video.thumbnail ? (
                                                        <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover" />
                                                    ) : (
                                                        <span className="text-[10px] text-zinc-400 font-bold font-mono tracking-tighter uppercase p-1 bg-white text-zinc-600 w-full h-full flex items-center justify-center">
                                                            {currentLanguage === "Русский" ? "Демо" : "Simulado"}
                                                        </span>
                                                    )}
                                                    <span className="absolute bottom-0.5 right-0.5 bg-black/80 text-[10px] text-white px-1 font-mono">
                                                        {video.duration}
                                                    </span>
                                                </div>

                                                <div className="flex-1 text-white text-[13px] landscape:text-[15px] leading-tight flex flex-col justify-start">
                                                    <h3 className="font-bold text-[14px] landscape:text-[16px] line-clamp-2 leading-snug">{video.title}</h3>
                                                    <p className="mt-1 font-semibold"># {t.likes}: {video.likes}</p>
                                                    <p className="font-semibold"># {t.views}: {video.views}</p>
                                                    <p className="text-gray-400 font-medium">{video.date}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Nueva sección de interfaz para el Historial de reproducciones */}
                        {currentPage === "history" && (
                            <div className="p-3">
                                <h2 className={`text-lg font-bold border-b pb-1 mb-2 uppercase tracking-wider ${holoEnabled ? "text-[#33b5e5] border-[#33b5e5]" : "text-yellow-400 border-gray-700"}`}>
                                    {t.navHistory}
                                </h2>
                                
                                {/* 4 Textos superiores amarillos/azules con funciones del historial */}
                                <div className="flex flex-wrap gap-x-4 gap-y-1 mb-4 text-xs font-bold font-mono">
                                    <span onClick={handleSelectAllHistory} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                        {t.selectAll}
                                    </span>
                                    <span onClick={handleClearAllHistory} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                        {t.clearAllHistory}
                                    </span>
                                    <span onClick={() => setHistoryPaused(!historyPaused)} className={`cursor-pointer underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}>
                                        {historyPaused ? t.resumeHistory : t.pauseHistory}
                                    </span>
                                    <span 
                                        onClick={selectedHistoryVideos.length > 0 ? handleDeleteSelectedHistory : null} 
                                        className={`underline ${selectedHistoryVideos.length > 0 ? "cursor-pointer" : "opacity-40 cursor-not-allowed"} ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}
                                    >
                                        {t.deleteSelected}
                                    </span>
                                </div>

                                {watchHistory.length === 0 ? (
                                    <p className="text-zinc-500 text-sm italic">{t.emptyHistory}</p>
                                ) : (
                                    <div className="space-y-3">
                                        {watchHistory.map((video, index) => (
                                            <div key={`hist-${video.id}-${index}`} className="flex items-center gap-2 bg-zinc-950 p-1 border border-zinc-900">
                                                <input 
                                                    type="checkbox" 
                                                    checked={selectedHistoryVideos.includes(video.id)}
                                                    onChange={() => toggleSelectHistoryVideo(video.id)}
                                                    className="w-4 h-4 cursor-pointer accent-orange-500"
                                                />
                                                <div 
                                                    className="flex flex-1 gap-2 cursor-pointer items-center"
                                                    onClick={() => handleVideoClickFromList(video)}
                                                >
                                                    <div className="w-20 h-12 bg-zinc-900 flex-shrink-0 overflow-hidden relative">
                                                        {video.thumbnail && <img src={video.thumbnail} className="w-full h-full object-cover" />}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="text-xs font-bold text-white line-clamp-1">{video.title}</h4>
                                                        <p className="text-[10px] text-zinc-400">{video.channelName}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {currentPage === "config" && (
                            <div className="p-3 space-y-6">
                                <div className="border-b border-gray-800 pb-4 space-y-3">
                                    <div className="flex flex-col items-start">
                                        <span className="text-base font-bold text-white tracking-wide uppercase block mb-1">
                                            {t.simulatedModeText}
                                        </span>
                                        <p 
                                            onClick={() => setIsSimulated(!isSimulated)}
                                            className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5] hover:text-cyan-300" : "text-yellow-400 hover:text-yellow-300"}`}
                                        >
                                            {isSimulated ? t.simulatedModeActive : t.simulatedModeInactive}
                                        </p>
                                    </div>

                                    <div className="flex flex-col items-start pt-2">
                                        <p 
                                            onClick={() => setHoloEnabled(!holoEnabled)}
                                            className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5] hover:text-cyan-300" : "text-yellow-400 hover:text-yellow-300"}`}
                                        >
                                            {holoEnabled ? t.holoActive : t.holoInactive}
                                        </p>
                                    </div>

                                    {/* Nuevas opciones añadidas a la sección de Configuración */}
                                    <div className="flex flex-col items-start pt-2 border-t border-zinc-900 w-full gap-2">
                                        <p 
                                            onClick={() => setSearchHistory([])}
                                            className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}
                                        >
                                            {t.clearSearchHistory}
                                        </p>
                                        <p 
                                            onClick={() => setIncognitoEnabled(!incognitoEnabled)}
                                            className={`font-bold text-sm tracking-wide uppercase cursor-pointer select-none underline ${holoEnabled ? "text-[#33b5e5]" : "text-yellow-400"}`}
                                        >
                                            {incognitoEnabled ? t.incognitoOn : t.incognitoOff}
                                        </p>
                                    </div>
                                </div>

                                <div>
                                    <span className="text-base font-bold text-white tracking-wide uppercase block mb-2">
                                        {t.language}
                                    </span>
                                    <div className="flex flex-wrap gap-4 font-bold text-sm">
                                        {["Español", "English", "Português", "Русский"].map((lang) => (
                                            <p
                                                key={lang}
                                                onClick={() => setCurrentLanguage(lang)}
                                                className={`cursor-pointer select-none underline tracking-wide uppercase ${
                                                    currentLanguage === lang
                                                    ? (holoEnabled ? "text-[#33b5e5] font-black scale-105" : "text-yellow-400 font-black scale-105")
                                                    : (holoEnabled ? "text-cyan-600/70 hover:text-[#33b5e5]" : "text-yellow-500/70 hover:text-yellow-400")
                                                }`}
                                            >
                                                {lang}
                                            </p>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-lg font-bold border-b border-gray-800 pb-1 mb-2">{t.about}</h2>
                                    <p className="text-sm text-gray-300 leading-relaxed text-justify mb-2">
                                        {t.aboutText}
                                    </p>
                                    <p className={`text-xs bg-zinc-950 p-2 border leading-normal text-left font-mono ${holoEnabled ? "border-[#33b5e5]/40 text-[#33b5e5]" : "border-zinc-800 text-yellow-500/90"}`}>
                                        {t.licenseText}
                                    </p>
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Menú contextual de navegación del Footer de 3x2 o 6x1 */}
                    {footerMenuOpen && (
                        <div 
                            onClick={(e) => e.stopPropagation()}
                            className={`fixed left-0 right-0 bottom-12 p-2 grid gap-2 z-50 ${
                                isLandscape ? "grid-cols-6" : "grid-cols-3"
                            } ${holoEnabled ? "bg-black/80 border-t border-[#33b5e5]" : "bg-neutral-100 border-t border-neutral-300"}`}
                        >
                            <button onClick={() => { setSearchQuery(""); fetchVideos(""); navigateTo("home"); }} className={getGridItemClass()}>
                                <span className="text-xs font-bold">{t.navHome}</span>
                            </button>
                            <button onClick={() => navigateTo("subscriptions")} className={getGridItemClass()}>
                                <span className="text-xs font-bold">{t.navSubs}</span>
                            </button>
                            <button 
                                onClick={() => { 
                                    setFooterMenuOpen(false); 
                                    if(currentPage !== "home" && currentPage !== "search") { navigateTo("home"); } 
                                    setTimeout(() => searchInputRef.current?.focus(), 100); 
                                }} 
                                className={getGridItemClass()}
                            >
                                <span className="text-xs font-bold">{t.navSearch}</span>
                            </button>
                            <button onClick={() => navigateTo("favorites")} className={getGridItemClass()}>
                                <span className="text-xs font-bold">{t.navFavs}</span>
                            </button>
                            <button onClick={() => navigateTo("history")} className={getGridItemClass()}>
                                <span className="text-xs font-bold">{t.navHistory}</span>
                            </button>
                            <button onClick={() => navigateTo("config")} className={getGridItemClass()}>
                                <span className="text-xs font-bold">{t.navConfig}</span>
                            </button>
                        </div>
                    )}

                    <footer 
                        onClick={(e) => e.stopPropagation()}
                        className={`fixed bottom-0 left-0 right-0 h-12 flex items-center justify-between px-6 z-50 transition-all ${
                            holoEnabled ? "bg-zinc-950 border-t-2 border-[#33b5e5]" : "bg-zinc-950 border-t border-zinc-800"
                        }`}
                    >
                        <button 
                            onClick={goBack} 
                            disabled={pageHistory.length <= 1}
                            className={`text-xl font-bold transition select-none ${pageHistory.length <= 1 ? "text-zinc-700 cursor-not-allowed" : "text-white hover:text-gray-300"}`}
                        >
                            ←
                        </button>

                        <div className="relative">
                            <div 
                                onClick={(e) => {
                                    e.stopPropagation();
                                    setFooterMenuOpen(!footerMenuOpen);
                                }} 
                                className="hamburger-lines p-1"
                            >
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                                <div className={holoEnabled ? "bg-[#33b5e5]" : "bg-white"}></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
