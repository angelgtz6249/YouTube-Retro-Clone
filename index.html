<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Retro Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Estilos específicos para imitar el aspecto de las capturas de pantalla */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        /* Eliminar estilos por defecto de inputs */
        input:focus {
            outline: none;
        }
        /* Estilo de tres puntitos verticales */
        .vertical-dots {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 14px;
            height: 40px;
            cursor: pointer;
        }
        .vertical-dots div {
            width: 12px;
            height: 12px;
            background-color: #a3a3a3;
            border-radius: 50%;
        }
    </style>
	<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registrado', reg))
        .catch(err => console.error('Error al registrar SW', err));
    });
  }
</script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const YOUTUBE_API_KEY = "AIzaSyC6fHHTGlkndc4wsDgKRinMQUJVwqd-Xo0";

        const translations = {
            Español: {
                searchPlaceholder: "Buscar...",
                likes: "Likes",
                views: "Vistas",
                subscribers: "Suscriptores",
                videoViews: "Visitas de videos",
                uploads: "Subidas",
                channelUploads: "Subidas del canal",
                comments: "Comentarios",
                language: "Idioma",
                about: "Acerca de",
                aboutText: "Esta aplicación es un clon conmemorativo de YouTube optimizado para simular las interfaces móviles clásicas y estructuradas según las especificaciones del diseño proporcionado. Ofrece navegación fluida entre videos, búsqueda directa de contenido, vistas de canal individuales, comentarios dinámicos y soporte multilenguaje completo en Español, Inglés y Portugués. Integra la API de YouTube v3 para obtener datos del mundo real de manera asíncrona. Bajo Licencia CC0 (Creative Commons Zero 1.0 Universal): Puedes hacerle lo que quieras a este proyecto siempre y cuando no hagan cosas raras, que los conozco.",
                duration: "Duración",
                noResults: "No se encontraron videos reales o la cuota de la API se ha agotado.",
                fallbackVideoTitle: "Título del video",
                fallbackDesc: "Sin descripción disponible para este video.",
                fallbackChannelDesc: "Sin descripción disponible para este canal.",
                configTitle: "Configuración"
            },
            English: {
                searchPlaceholder: "Search...",
                likes: "Likes",
                views: "Views",
                subscribers: "Subscribers",
                videoViews: "Video Views",
                uploads: "Uploads",
                channelUploads: "Channel uploads",
                comments: "Comments",
                language: "Language",
                about: "About",
                aboutText: "This application is a commemorative YouTube clone optimized to simulate classic and structured mobile interfaces according to the specifications of the design provided. It offers fluid navigation between videos, direct search of content, individual channel views, dynamic comments, and full multilingual support in Spanish, English, and Portuguese. It integrates the YouTube v3 API to fetch real-world data asynchronously. Under CC0 License (Creative Commons Zero 1.0 Universal): You can do whatever you want with this project as long as you don't do weird things, because I know you.",
                duration: "Duration",
                noResults: "No real videos found or API quota exceeded.",
                fallbackVideoTitle: "Video Title",
                fallbackDesc: "No description available for this video.",
                fallbackChannelDesc: "No description available for this channel.",
                configTitle: "Settings"
            },
            Português: {
                searchPlaceholder: "Buscar...",
                likes: "Curtidas",
                views: "Visualizações",
                subscribers: "Inscritos",
                videoViews: "Visualizações do canal",
                uploads: "Envios",
                channelUploads: "Envios do canal",
                comments: "Comentários",
                language: "Idioma",
                about: "Sobre",
                aboutText: "Esta aplicação é um clone conmemorativo do YouTube otimizado para simular interfaces móveis clássicas e estruturadas de acordo com as especificações do design fornecido. Oferece navegação fluida entre vídeos, busca direta de conteúdo, visualizações de canais individuais, comentários dinâmicos e suporte multilíngue completo em espanhol, inglês e português. Integra a API do YouTube v3 para obter dados do mundo real de forma após-síncrona. Sob Licença CC0 (Creative Commons Zero 1.0 Universal): Você pode fazer o que quiser com este projeto, contanto que não faça coisas estranhas, porque eu conheço você.",
                duration: "Duração",
                noResults: "Nenhum vídeo real encontrado ou cota da API esgotada.",
                fallbackVideoTitle: "Título do vídeo",
                fallbackDesc: "Nenhuma descrição disponível para este vídeo.",
                fallbackChannelDesc: "Nenhuma descrição disponível para este canal.",
                configTitle: "Configurações"
            }
        };

        function App() {
            const [currentLanguage, setCurrentLanguage] = React.useState("Español");
            const [currentPage, setCurrentPage] = React.useState("home");
            const [history, setHistory] = React.useState(["home"]);
            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedVideo, setSelectedVideo] = React.useState(null);
            const [selectedChannel, setSelectedChannel] = React.useState(null);
            const [videos, setVideos] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [errorMsg, setErrorMsg] = React.useState("");
            const [playIframe, setPlayIframe] = React.useState(false);

            const t = translations[currentLanguage];

            const navigateTo = (page) => {
                setHistory(prev => [...prev, page]);
                setCurrentPage(page);
            };

            const goBack = () => {
                if (history.length > 1) {
                    const newHistory = [...history];
                    newHistory.pop();
                    setHistory(newHistory);
                    setCurrentPage(newHistory[newHistory.length - 1]);
                }
            };

            const goHome = () => {
                setHistory(["home"]);
                setCurrentPage("home");
            };

            const fetchVideos = async (query = "") => {
                setLoading(true);
                setErrorMsg("");

                if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === "INSERTA_TU_CLAVE_API") {
                    setErrorMsg("Falta configurar una clave de API válida.");
                    setVideos([]);
                    setLoading(false);
                    return;
                }

                try {
                    let url = "";
                    if (query.trim() === "") {
                        url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=50&key=${YOUTUBE_API_KEY}`;
                    } else {
                        url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                    }

                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Error en la API de YouTube");
                    const data = await response.json();

                    let items = data.items || [];

                    if (query.trim() !== "" && items.length > 0) {
                        const videoIds = items.map(item => item.id?.videoId).filter(Boolean).join(",");
                        if (videoIds) {
                            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                            const statsResponse = await fetch(statsUrl);
                            if (statsResponse.ok) {
                                const statsData = await statsResponse.json();
                                items = statsData.items || [];
                            }
                        }
                    }

                    const formattedVideos = items.map(item => {
                        const durationISO = item.contentDetails?.duration || "PT3M15S";
                        const duration = parseISODuration(durationISO);
                        const finalId = item.id?.videoId || item.id;

                        return {
                            id: typeof finalId === 'object' ? finalId.videoId : finalId,
                            title: item.snippet?.title || t.fallbackVideoTitle,
                            likes: parseInt(item.statistics?.likeCount || 0).toLocaleString(),
                            views: parseInt(item.statistics?.viewCount || 0).toLocaleString(),
                            date: new Date(item.snippet?.publishedAt).toLocaleDateString(),
                            duration: duration,
                            channelName: item.snippet?.channelTitle ? `@${item.snippet.channelTitle.replace(/\s+/g, "_")}` : "@canal",
                            channelId: item.snippet?.channelId,
                            description: item.snippet?.description || t.fallbackDesc,
                            thumbnail: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
                            comments: []
                        };
                    });

                    setVideos(formattedVideos);

                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error de conexión o cuota de API de YouTube agotada.");
                    setVideos([]);
                } finally {
                    setLoading(false);
                }
            };

            const parseISODuration = (isoString) => {
                const match = isoString.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                if (!match) return "00:00:00";
                const hours = parseInt(match[1] || 0);
                const minutes = parseInt(match[2] || 0);
                const seconds = parseInt(match[3] || 0);
                const pad = (n) => String(n).padStart(2, "0");
                return hours > 0 ? `${pad(hours)}:${pad(minutes)}:${pad(seconds)}` : `${pad(minutes)}:${pad(seconds)}`;
            };

            const fetchComments = async (videoId) => {
                if (!YOUTUBE_API_KEY || !videoId) return;
                try {
                    const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=15&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        const fetchedComments = (data.items || []).map(item => ({
                            author: `@${item.snippet.topLevelComment.snippet.authorDisplayName.replace(/\s+/g, "_")}`,
                            text: item.snippet.topLevelComment.snippet.textDisplay
                        }));
                        setSelectedVideo(prev => prev ? { ...prev, comments: fetchedComments } : null);
                    }
                } catch (err) {
                    console.error("Error fetching comments:", err);
                }
            };

            const fetchChannelDetails = async (channelId, channelHandle) => {
                setLoading(true);
                if (!YOUTUBE_API_KEY || !channelId) {
                    setLoading(false);
                    return;
                }

                try {
                    const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${YOUTUBE_API_KEY}`;
                    const res = await fetch(chanUrl);
                    if (!res.ok) throw new Error("No se pudo obtener el canal");
                    const data = await res.json();
                    const item = data.items?.[0];

                    if (!item) throw new Error("Canal inexistente");

                    // Modificado: Agregado order=date para traer los vídeos desde el más reciente
                    const videosUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=50&order=date&type=video&key=${YOUTUBE_API_KEY}`;
                    const resVideos = await fetch(videosUrl);
                    let channelVideos = [];
                    if (resVideos.ok) {
                        const dataV = await resVideos.json();
                        channelVideos = (dataV.items || []).map(v => ({
                            id: v.id?.videoId || v.id,
                            title: v.snippet?.title || t.fallbackVideoTitle,
                            likes: "N/A",
                            views: "Ver video",
                            date: new Date(v.snippet?.publishedAt).toLocaleDateString(),
                            duration: "--:--",
                            channelName: channelHandle,
                            channelId: channelId,
                            description: v.snippet?.description || t.fallbackDesc,
                            thumbnail: v.snippet?.thumbnails?.high?.url || v.snippet?.thumbnails?.medium?.url || ""
                        }));
                    }

                    setSelectedChannel({
                        name: channelHandle,
                        subscribers: parseInt(item?.statistics?.subscriberCount || 0).toLocaleString(),
                        videoViews: parseInt(item?.statistics?.viewCount || 0).toLocaleString(),
                        uploads: parseInt(item?.statistics?.videoCount || 0).toLocaleString(),
                        description: item?.snippet?.description || t.fallbackChannelDesc,
                        avatar: item?.snippet?.thumbnails?.high?.url || item?.snippet?.thumbnails?.medium?.url || "",
                        videos: channelVideos
                    });

                    navigateTo("channel");
                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error al cargar los detalles reales de este canal.");
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                fetchVideos(searchQuery);
            }, [currentLanguage]);

            const handleSearch = (e) => {
                if (e) e.preventDefault();
                fetchVideos(searchQuery);
                navigateTo("search");
            };

            const handleVideoClick = (video) => {
                setSelectedVideo(video);
                setPlayIframe(false);
                navigateTo("player");
                if (video.id) {
                    fetchComments(video.id);
                }
            };

            const handleChannelClick = (channelId, channelName) => {
                if (channelId) {
                    fetchChannelDetails(channelId, channelName);
                }
            };

            const changeLanguage = (lang) => {
                setCurrentLanguage(lang);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-black border-x border-gray-800 flex flex-col justify-between">
                    <div>
                        <header className="bg-gray-700 text-white font-bold text-lg px-3 py-2 border-b-2 border-black tracking-wide">
                            YouTube
                        </header>

                        <div className="bg-black p-2 flex items-center justify-between gap-2 border-b border-gray-900">
                            <form onSubmit={handleSearch} className="flex flex-1 items-center gap-2">
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder={t.searchPlaceholder}
                                    className="flex-1 bg-white text-black font-semibold px-2 py-1.5 text-base rounded-none placeholder-gray-400"
                                />
                                <button
                                    type="submit"
                                    className="bg-neutral-400 hover:bg-neutral-500 text-black px-4 py-1.5 font-bold border border-neutral-500 rounded-none transition"
                                >
                                    &nbsp;
                                </button>
                            </form>

                            <div
                                onClick={() => navigateTo("config")}
                                className="vertical-dots pl-1 py-1"
                                title={t.configTitle}
                            >
                                <div></div>
                                <div></div>
                                <div></div>
                            </div>
                        </div>

                        {loading && (
                            <div className="text-center p-6 text-yellow-400 font-bold">
                                CARGANDO...
                            </div>
                        )}

                        {errorMsg && (
                            <div className="text-center p-4 text-red-500 font-mono text-xs">
                                {errorMsg}
                            </div>
                        )}

                        {(currentPage === "home" || currentPage === "search") && !loading && (
                            <div className="p-2 space-y-4">
                                {videos.length === 0 ? (
                                    <div className="text-center text-gray-500 py-10 font-semibold">
                                        {t.noResults}
                                    </div>
                                ) : (
                                    videos.map((video, index) => (
                                        <div
                                            key={`${video.id}-${index}`}
                                            className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1.5 transition"
                                            onClick={() => handleVideoClick(video)}
                                        >
                                            <div className="w-32 h-20 bg-zinc-900 flex-shrink-0 flex items-center justify-center border border-gray-700 overflow-hidden relative">
                                                {video.thumbnail ? (
                                                    <img
                                                        src={video.thumbnail}
                                                        alt={video.title}
                                                        className="w-full h-full object-cover"
                                                    />
                                                ) : (
                                                    <span className="text-xs text-zinc-500 font-mono">No Image</span>
                                                )}
                                                <span className="absolute bottom-0.5 right-0.5 bg-black/80 text-[10px] text-white px-1 font-mono">
                                                    {video.duration}
                                                </span>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="text-sm font-bold text-gray-200 line-clamp-2 leading-tight mb-1">
                                                    {video.title}
                                                </h4>
                                                <p className="text-xs text-neutral-400 truncate mb-0.5">
                                                    {video.channelName}
                                                </p>
                                                <p className="text-[11px] text-zinc-500">
                                                    # {t.views}: {video.views}
                                                </p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {currentPage === "player" && selectedVideo && (
                            <div className="p-2 space-y-4">
                                <div className="w-full aspect-video bg-zinc-900 border border-zinc-800 flex items-center justify-center">
                                    <iframe 
                                        className="w-full h-full"
                                        src={`https://www.youtube.com/embed/${selectedVideo.id}?autoplay=1`}
                                        frameBorder="0"
                                        allowFullScreen
                                    ></iframe>
                                </div>

                                <div>
                                    <h3 className="text-base font-bold text-white mb-1">{selectedVideo.title}</h3>
                                    <div className="text-xs text-neutral-400 space-y-1 bg-zinc-950 p-2 border border-zinc-900">
                                        <p 
                                            className="text-cyan-400 font-bold cursor-pointer hover:underline"
                                            onClick={() => handleChannelClick(selectedVideo.channelId, selectedVideo.channelName)}
                                        >
                                            {selectedVideo.channelName}
                                        </p>
                                        <p># {t.views}: {selectedVideo.views} | # {t.likes}: {selectedVideo.likes}</p>
                                        <p className="text-zinc-500 text-[11px] pt-1 border-t border-zinc-900">{selectedVideo.description}</p>
                                    </div>
                                </div>

                                <div className="pt-2 border-t border-zinc-900">
                                    <h4 className="text-xs font-bold text-zinc-400 tracking-wider uppercase mb-2 px-1">{t.comments}</h4>
                                    <div className="space-y-2">
                                        {selectedVideo.comments && selectedVideo.comments.length > 0 ? (
                                            selectedVideo.comments.map((c, i) => (
                                                <div key={i} className="bg-zinc-950 p-2 border border-zinc-900 text-xs">
                                                    <span className="text-neutral-300 font-bold block mb-0.5">{c.author}</span>
                                                    <p className="text-zinc-400" dangerouslySetInnerHTML={{ __html: c.text }}></p>
                                                </div>
                                            ))
                                        ) : (
                                            <p className="text-xs text-zinc-600 px-1">Sin comentarios en este video.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "channel" && selectedChannel && (
                            <div className="p-2 space-y-4">
                                <div className="flex items-center gap-3 bg-zinc-950 p-3 border border-zinc-900">
                                    <div className="w-14 h-14 bg-zinc-800 rounded-full border border-zinc-700 overflow-hidden flex-shrink-0">
                                        {selectedChannel.avatar && (
                                            <img src={selectedChannel.avatar} alt="" className="w-full h-full object-cover" />
                                        )}
                                    </div>
                                    <div>
                                        <h3 className="text-base font-bold text-white">{selectedChannel.name}</h3>
                                        <p className="text-xs text-neutral-400"># {t.subscribers}: {selectedChannel.subscribers}</p>
                                        <p className="text-[11px] text-zinc-500">
                                            # {t.videoViews}: {selectedChannel.videoViews} | # {t.uploads}: {selectedChannel.uploads}
                                        </p>
                                    </div>
                                </div>

                                <p className="text-xs text-zinc-400 px-1">{selectedChannel.description}</p>

                                <div className="border-t border-zinc-900 pt-3">
                                    <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2 px-1">{t.channelUploads}</h4>
                                    <div className="space-y-3">
                                        {selectedChannel.videos.map((video, idx) => (
                                            <div 
                                                key={`${video.id}-${idx}`}
                                                className="flex gap-3 cursor-pointer hover:bg-zinc-900 p-1"
                                                onClick={() => handleVideoClick(video)}
                                            >
                                                <div className="w-28 h-18 bg-zinc-900 flex-shrink-0 border border-gray-800 relative">
                                                    {video.thumbnail && (
                                                        <img src={video.thumbnail} alt="" className="w-full h-full object-cover" />
                                                    )}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <h5 className="text-xs font-bold text-gray-300 line-clamp-2">{video.title}</h5>
                                                    <p className="text-[10px] text-zinc-500 mt-1">{video.date}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === "config" && (
                            <div className="p-3 space-y-4">
                                <h3 className="text-lg font-bold border-b border-zinc-800 pb-1 text-gray-200">{t.configTitle}</h3>
                                
                                <div className="space-y-2">
                                    <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">{t.language}</h4>
                                    <div className="flex gap-2">
                                        {["Español", "English", "Português"].map((lang) => (
                                            <button
                                                key={lang}
                                                onClick={() => changeLanguage(lang)}
                                                className={`px-3 py-1.5 text-xs font-bold border tracking-wide transition ${
                                                    currentLanguage === lang
                                                        ? "bg-white text-black border-white"
                                                        : "bg-black text-gray-400 border-zinc-800 hover:text-white"
                                                }`}
                                            >
                                                {lang}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <h4 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">{t.about}</h4>
                                    <p className="text-xs text-zinc-400 leading-relaxed bg-zinc-950 p-2 border border-zinc-900">
                                        {t.aboutText}
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Nuevo Footer en todas las páginas con controles de navegación */}
                    <footer className="bg-black border-t border-zinc-900 py-3 px-6 flex justify-between items-center sticky bottom-0 z-50">
                        <button 
                            onClick={goBack}
                            disabled={history.length <= 1}
                            className="text-xs font-bold tracking-wider text-neutral-400 hover:text-white disabled:opacity-30 disabled:hover:text-neutral-400 transition uppercase"
                        >
                            &lt; Volver
                        </button>
                        
                        <button 
                            onClick={goHome}
                            className="text-xs font-bold tracking-wider text-neutral-400 hover:text-white transition uppercase"
                        >
                            Inicio
                        </button>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
